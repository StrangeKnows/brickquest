<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>BrickQuest — Rumble Test</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="rumble.css">
<style>
  /* Test-page UI only (class picker + readout panel).
     Combat-related styles (canvas, brick bars, HUD) come from rumble.css. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { overscroll-behavior: none; }
  body {
    background:#0a0a0f; color:#eee;
    font-family:'Cinzel',serif;
    overflow:hidden;
    width:100vw; height:100dvh;
    display:flex; flex-direction:column;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #overlay {
    position:fixed; inset:0; z-index:300;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.88);
    padding:16px;
    overflow-y:auto;
  }
  #overlay h1 { font-size:22px; color:#F5D000; margin-bottom:4px; text-align:center; }
  #overlay h2 { font-size:11px; color:#888; letter-spacing:.1em; margin:10px 0 6px; text-align:center; }
  #overlay p  { font-size:12px; color:#888; margin-bottom:10px; text-align:center; max-width:300px; line-height:1.4; }

  /* Two-column layout: controls on left, class grid on right.
     Collapses to stacked on very narrow screens (< 480px). */
  .picker-layout {
    display:flex; flex-direction:row;
    gap:18px; align-items:flex-start;
    width:100%; max-width:640px;
  }
  .picker-controls { display:flex; flex-direction:column; align-items:stretch; flex:0 0 auto; }
  .picker-classes  { display:flex; flex-direction:column; align-items:center; flex:1 1 auto; min-width:0; }

  @media (max-width: 480px) {
    .picker-layout { flex-direction:column; align-items:center; gap:8px; }
    .picker-controls { align-items:center; }
  }

  .mode-toggle { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; justify-content:center; }
  .mode-btn {
    padding:7px 14px; border-radius:8px; border:1px solid #333;
    background:#111; cursor:pointer; font-family:'Cinzel',serif;
    font-size:10px; letter-spacing:.08em; color:#888;
    transition:all .15s;
  }
  .mode-btn.active { background:#1a1500; border-color:#F5D000; color:#F5D000; }

  .class-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:300px; max-width:92vw; }
  .class-pick {
    padding:10px 6px; border-radius:8px; border:1px solid #333;
    background:#111; cursor:pointer; text-align:center;
    transition:border-color .15s, background .15s;
  }
  .class-pick:hover, .class-pick:active { border-color:#F5D000; background:#1a1500; }
  .class-pick .icon { font-size:22px; display:block; margin-bottom:3px; }
  .class-pick .name { font-size:9px; letter-spacing:.08em; color:#888; }
  .class-pick .stats { font-size:9px; color:#555; margin-top:3px; font-family:monospace; }
  .class-pick .kit   { font-size:9px; color:#aaa; margin-top:3px; font-family:monospace; line-height:1.4; }

  /* Readout panel (live state during spec-mode battle) */
  #readout {
    position:fixed; top:8px; left:50%; transform:translateX(-50%);
    z-index:210;
    background:rgba(0,0,0,.85);
    border:1px solid #333; border-radius:8px;
    padding:6px 10px;
    font-family:monospace; font-size:10px; color:#aaa;
    line-height:1.5;
    max-width:calc(100vw - 150px);
    text-align:center;
    pointer-events:none;
  }
  #readout .label { color:#666; }
  #readout .val   { color:#eee; }
  #readout .sig   { color:#F5D000; }
  #readout .off   { color:#ff9944; }
  #readout.hidden { display:none; }

  /* Waves mode: top-center banner showing current wave + theme.
     Fades in 250ms when wave starts, holds, fades out as enemies engage. */
  #wave-hud {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    z-index:200; pointer-events:none;
    background:rgba(8,8,12,0.85);
    border:1px solid #F5D00044;
    border-radius:6px;
    padding:8px 16px;
    font-family:'Cinzel',serif; letter-spacing:.08em;
    color:#eee; text-align:center;
    opacity:0;
    transition:opacity 280ms ease-out;
  }
  #wave-hud.visible { opacity:1; }
  #wave-hud .wave-num { font-size:18px; color:#F5D000; font-weight:700; }
  #wave-hud .wave-theme { font-size:10px; color:#888; margin-top:2px; }

  /* Tiny persistent badge in top-left while waves run — current wave number. */
  #wave-badge {
    position:fixed; top:8px; left:8px; z-index:199;
    background:#0a0a0a; border:1px solid #444;
    padding:4px 8px; border-radius:5px;
    font-family:ui-monospace,monospace; font-size:11px;
    color:#F5D000;
    pointer-events:none;
    opacity:0; transition:opacity 200ms;
  }
  #wave-badge.visible { opacity:1; }

  /* Resistance dialer — compact 3x3 grid of color rows under ENTITIES.
     Each row: tiny color swatch + 3-letter abbrev + numeric input.
     All values are floats (e.g. 0, 0.5, 1, 1.5, 2) representing resist mult. */
  .resist-grid {
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:4px;
    margin-bottom:6px;
  }
  .resist-cell {
    display:flex; align-items:center; gap:3px;
    background:#111; border:1px solid #222; border-radius:5px;
    padding:3px 4px;
  }
  .resist-swatch {
    width:10px; height:10px; border-radius:2px;
    flex:0 0 auto; border:1px solid rgba(255,255,255,0.15);
  }
  .resist-label {
    font-size:8px; color:#888; letter-spacing:0.04em;
    font-family:'Cinzel',serif;
    flex:0 0 auto;
  }
  .resist-input {
    flex:1 1 auto; width:100%; min-width:0;
    background:#000; border:1px solid #333; border-radius:3px;
    color:#eee; padding:2px 3px;
    font-family:monospace; font-size:10px;
    text-align:center;
  }
  .resist-input:focus { outline:none; border-color:#F5D000; }
  .resist-hint {
    font-size:8px; color:#555; margin-bottom:4px; text-align:center;
    font-family:monospace; letter-spacing:0.02em;
  }
</style>
</head>
<body>

<!-- HUD: timer top-right (optional on this test page) -->
<div id="rumble-hud">
  <div id="rumble-hud-right">
    <div style="text-align:right;">
      <div id="rumble-timer-display">INF</div>
      <div id="rumble-timer-label">SECS</div>
    </div>
  </div>
</div>

<!-- Canvas + brick bars (left 5, right 4) -->
<canvas id="rumble-canvas"></canvas>
<div id="rumble-brick-bar-left" class="rumble-brick-bar"></div>
<div id="rumble-brick-bar-right" class="rumble-brick-bar"></div>

<!-- Live readout panel (shown during spec mode battles) -->
<div id="readout" class="hidden"></div>

<!-- Hidden compatibility elements: the module's updateHUD writes to these if present. -->
<div style="display:none;">
  <div id="hud-hp"></div>
  <div id="hud-hp-max"></div>
  <div id="hud-class"></div>
  <div id="hp-bar"></div>
  <div id="armor-pips"></div>
  <div id="dash-display">DASH</div>
  <div id="dash-cd">READY</div>
</div>

<!-- Debug overlay — only present on the page when ?debug=1 is in the URL. -->

<!-- CLASS PICKER OVERLAY -->
<div id="overlay">
  <h1>BrickQuest Rumble Test</h1>
  <p>Pick a mode and class.</p>

  <div class="picker-layout">
    <div class="picker-controls">
      <h2>MODE</h2>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-sandbox" onclick="setMode('sandbox')">SANDBOX</button>
        <button class="mode-btn"        id="mode-spec"    onclick="setMode('spec')">SPEC</button>
        <button class="mode-btn"        id="mode-waves"   onclick="setMode('waves')">WAVES</button>
      </div>

      <h2>ENTITIES</h2>
      <div class="mode-toggle">
        <button class="mode-btn active" id="ent-1" onclick="setEntityCount(1)">1</button>
        <button class="mode-btn"        id="ent-2" onclick="setEntityCount(2)">2</button>
        <button class="mode-btn"        id="ent-3" onclick="setEntityCount(3)">3</button>
        <button class="mode-btn"        id="ent-5" onclick="setEntityCount(5)">5</button>
      </div>

      <h2>ENTITY TYPE</h2>
      <select id="entity-type-select" onchange="setEntityType(this.value)" style="width:100%;padding:6px 8px;background:#222;color:#eee;border:1px solid #444;border-radius:4px;font-family:'Cinzel',serif;letter-spacing:.05em;">
        <option value="random">RANDOM (per spawn)</option>
        <option value="goblin">Goblin (Phys, grunt)</option>
        <option value="skeleton">Skeleton (Phys, grunt)</option>
        <option value="slinger">Slinger (Phys, ranged)</option>
        <option value="shadow_wolf">Shadow Wolf (Ether, fast)</option>
        <option value="creeping_vines">Creeping Vines (Mal, stationary pulse)</option>
        <option value="rot_grub">Rot Grub (Mal, splitter)</option>
        <option value="stone_troll">Stone Troll (Phys, heavy melee)</option>
        <option value="cursed_knight">Cursed Knight (Phys, swing)</option>
        <option value="void_wraith">Void Wraith (Ether, teleport)</option>
        <option value="stone_colossus">Stone Colossus (Phys boss)</option>
        <option value="blight_worm">Blight Worm (Mal boss)</option>
      </select>

      <h2>ENTITY RESISTANCES</h2>
      <div class="resist-hint">0=imm 0.5=res 1=neut 1.5=vul 2=weak</div>
      <div class="resist-grid" id="resist-grid"></div>
    </div>

    <div class="picker-classes">
      <h2>CLASS</h2>
      <div class="class-grid" id="class-grid"></div>
    </div>
  </div>
</div>

<script src="rumble.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// Rumble Test Harness
// ═══════════════════════════════════════════════════════════════════════

// Combat & Economy v1 — locked starting kits per class.
// Each class starts with 3 bricks: 2 signature + 1 secondary.
var SPEC_CLASSES = {
  breaker:     { icon:'\u2694\uFE0F', name:'BREAKER',    hp:14, speed:150, sig:'red',    sec:'gray',   kit:{red:2, gray:1}     },
  formwright:  { icon:'\uD83D\uDD2E', name:'FORMWRIGHT', hp:6,  speed:180, sig:'blue',   sec:'purple', kit:{blue:2, purple:1}  },
  snapstep:    { icon:'\uD83C\uDFC3', name:'SNAPSTEP',   hp:9,  speed:260, sig:'orange', sec:'red',    kit:{orange:2, red:1}   },
  blocksmith:  { icon:'\uD83D\uDD27', name:'BLOCKSMITH', hp:12, speed:150, sig:'gray',   sec:'orange', kit:{gray:2, orange:1}  },
  fixer:       { icon:'\uD83D\uDC8A', name:'FIXER',      hp:8,  speed:160, sig:'white',  sec:'black', kit:{white:2, black:1} },
  wild_one:    { icon:'\uD83D\uDC3E', name:'WILD ONE',   hp:10, speed:220, sig:'green',  sec:'yellow', kit:{green:2, yellow:1} },
};

var currentMode = 'sandbox';
var currentEntityCount = 1;
// Entity-type selector — 'random' picks a fresh type per spawn from the
// full registry; any other value (e.g. 'goblin', 'stone_troll') locks the
// spawn to that type. Used by startTestRumble + the sandbox respawn loop.
var currentEntityType = 'random';
var ENTITY_TYPE_LIST = [
  'goblin', 'skeleton', 'slinger', 'shadow_wolf', 'creeping_vines',
  'rot_grub',
  'stone_troll', 'cursed_knight', 'void_wraith',
  'stone_colossus', 'blight_worm',
];
function setEntityType(v) { currentEntityType = v; }
function pickEntityType() {
  if (currentEntityType === 'random') {
    return ENTITY_TYPE_LIST[Math.floor(Math.random() * ENTITY_TYPE_LIST.length)];
  }
  return currentEntityType;
}

// Per-color resistance multipliers applied to every spawned entity.
// All default to 1.0 (neutral). Integer or float input accepted.
// Keyed by color; rumble.js will store these under entity.resistances.
var BRICK_COLORS_ORDER = ['red','orange','gray','blue','purple','white','yellow','green','black'];
var BRICK_HEX = {
  red:'#E24B4A', orange:'#F57C00', gray:'#888888',
  blue:'#4db8ff', purple:'#7B2FBE', white:'#eeeeee',
  yellow:'#F5D000', green:'#1D9E75', black:'#2a2a2a',
};
var currentResistances = {};
BRICK_COLORS_ORDER.forEach(function(c) { currentResistances[c] = 1; });

function renderResistGrid() {
  var grid = document.getElementById('resist-grid');
  if (!grid) return;
  var html = '';
  BRICK_COLORS_ORDER.forEach(function(c) {
    html += '<div class="resist-cell">'
      +     '<span class="resist-swatch" style="background:' + BRICK_HEX[c] + ';"></span>'
      +     '<span class="resist-label">' + c.substr(0,3).toUpperCase() + '</span>'
      +     '<input type="number" class="resist-input" id="rz-' + c + '" '
      +       'step="0.5" min="0" value="' + currentResistances[c] + '" '
      +       'onchange="updateResist(\'' + c + '\', this.value)" '
      +       'oninput="updateResist(\'' + c + '\', this.value)">'
      +   '</div>';
  });
  grid.innerHTML = html;
}
function updateResist(color, raw) {
  var v = parseFloat(raw);
  if (isNaN(v) || v < 0) v = 1;
  currentResistances[color] = v;
}

function setEntityCount(n) {
  currentEntityCount = n;
  [1, 2, 3, 5].forEach(function(v) {
    var el = document.getElementById('ent-' + v);
    if (el) el.classList.toggle('active', v === n);
  });
}

function setMode(m) {
  currentMode = m;
  document.getElementById('mode-sandbox').classList.toggle('active', m === 'sandbox');
  document.getElementById('mode-spec').classList.toggle('active', m === 'spec');
  document.getElementById('mode-waves').classList.toggle('active', m === 'waves');
  renderClassGrid();
}

function renderClassGrid() {
  var grid = document.getElementById('class-grid');
  var html = '';
  Object.keys(SPEC_CLASSES).forEach(function(cls) {
    var m = SPEC_CLASSES[cls];
    var stats = currentMode === 'spec'
      ? 'HP ' + m.hp + ' \u00B7 spd ' + m.speed
      : 'HP ' + m.hp + ' \u00B7 random kit';
    var kit = currentMode === 'spec'
      ? Object.entries(m.kit).map(function(kv) { return kv[1] + ' ' + kv[0]; }).join(' + ')
      : '';
    html += '<div class="class-pick" onclick="startTestRumble(\'' + cls + '\')">'
      +   '<span class="icon">' + m.icon + '</span>'
      +   '<span class="name">' + m.name + '</span>'
      +   '<div class="stats">' + stats + '</div>'
      +   (kit ? '<div class="kit">' + kit + '</div>' : '')
      + '</div>';
  });
  grid.innerHTML = html;
}

// Sandbox mode gives 1-10 random bricks of each color.
function randomSandboxBricks() {
  var COLORS = ['red','white','yellow','blue','orange','gray','green','purple','black'];
  var out = {};
  COLORS.forEach(function(c) { out[c] = 1 + Math.floor(Math.random() * 10); });
  return out;
}

// Request fullscreen if possible. Silent if denied (iframe, unsupported, etc).
function tryFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen)          el.requestFullscreen().catch(function(){});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen)   el.msRequestFullscreen();
}

// ═══════════════════════════════════════════════════════════════════════
// WAVES MODE — staged enemy reveals for AI / pairing / balance testing.
// ═══════════════════════════════════════════════════════════════════════
// Each wave def: { count, types, theme }
//   count: number of entities to spawn this wave
//   types: array of entity type strings, OR 'random' string (rolls per spawn)
//          If types.length < count, repeat-cycle through types.
//   theme: short label shown in the wave banner — describes the design intent.
//
// First 10 waves are hand-tuned to expose specific AI/pairing behaviors:
// solo baseline → paired grunts → ranged+melee → fast pressure → tank+ranged →
// physical+zone → ethereal mix → boss-light+adds → splitter solo → boss+adds.
// After wave 10, generate random scaling waves: count grows, type pool widens.
var WAVE_DEFS = [
  { count: 1, types: ['goblin'],                                theme: 'BASELINE' },
  { count: 2, types: ['goblin', 'skeleton'],                    theme: 'PAIRED GRUNTS' },
  { count: 2, types: ['slinger', 'goblin'],                     theme: 'RANGED + MELEE' },
  { count: 2, types: ['shadow_wolf'],                           theme: 'FAST PRESSURE' },
  { count: 2, types: ['stone_troll', 'slinger'],                theme: 'TANK + RANGED' },
  { count: 2, types: ['cursed_knight', 'creeping_vines'],       theme: 'PHYSICAL + ZONE' },
  { count: 2, types: ['void_wraith', 'cursed_knight'],          theme: 'ETHEREAL MIX' },
  { count: 3, types: ['stone_troll', 'goblin', 'goblin'],       theme: 'TANK + ADDS' },
  { count: 1, types: ['blight_worm'],                           theme: 'SPLITTER' },
  { count: 3, types: ['stone_colossus', 'goblin', 'goblin'],    theme: 'BOSS + ADDS' },
];

// Entity pool for random waves past wave 10.
var WAVE_POOL_NORMAL = ['goblin','skeleton','slinger','shadow_wolf','rot_grub','creeping_vines'];
var WAVE_POOL_HEAVY  = ['stone_troll','cursed_knight','void_wraith'];
var WAVE_POOL_BOSS   = ['stone_colossus','blight_worm'];

// Generate a random wave definition for wave number n (1-indexed).
function generateRandomWave(n) {
  // Past wave 10: scale count gently, mix in heavies, occasional boss.
  // n=11 → 3 normals; n=15 → 4 with a heavy; n=20+ → 5+ with boss roll
  var count = 3 + Math.floor((n - 10) / 4);
  count = Math.min(count, 6);  // hard cap so it doesn't get silly
  var types = [];
  // 20% boss roll past wave 12, 40% past wave 18
  var bossChance = n >= 18 ? 0.4 : (n >= 12 ? 0.2 : 0);
  if (Math.random() < bossChance) {
    types.push(WAVE_POOL_BOSS[Math.floor(Math.random() * WAVE_POOL_BOSS.length)]);
  }
  // 50% chance of including a heavy
  if (Math.random() < 0.5) {
    types.push(WAVE_POOL_HEAVY[Math.floor(Math.random() * WAVE_POOL_HEAVY.length)]);
  }
  // Fill rest with normals
  while (types.length < count) {
    types.push(WAVE_POOL_NORMAL[Math.floor(Math.random() * WAVE_POOL_NORMAL.length)]);
  }
  return { count: count, types: types, theme: 'WAVE ' + n };
}

var _waveState = {
  active: false,
  currentWave: 0,
  highestReached: 0,
  advancing: false,
};

// Spawn the entities for wave n (1-indexed). Shows the banner + badge.
function spawnWave(n) {
  var def = (n <= WAVE_DEFS.length) ? WAVE_DEFS[n - 1] : generateRandomWave(n);
  // Cycle through type list to fill count
  for (var i = 0; i < def.count; i++) {
    var t = def.types[i % def.types.length];
    Rumble.spawnEntity(t);
  }
  showWaveBanner(n, def.theme);
  updateWaveBadge(n);
}

// Show the WAVE N · THEME banner briefly. Fades in fast, holds, fades out.
function showWaveBanner(n, theme) {
  var hud = document.getElementById('wave-hud');
  if (!hud) {
    hud = document.createElement('div');
    hud.id = 'wave-hud';
    document.body.appendChild(hud);
  }
  hud.innerHTML = '<div class="wave-num">WAVE ' + n + '</div>'
    + '<div class="wave-theme">' + (theme || '') + '</div>';
  hud.classList.add('visible');
  // Fade out after 2.2s — leaves badge as the persistent reference
  clearTimeout(hud._fadeTimer);
  hud._fadeTimer = setTimeout(function() {
    hud.classList.remove('visible');
  }, 2200);
}

function updateWaveBadge(n) {
  var b = document.getElementById('wave-badge');
  if (!b) {
    b = document.createElement('div');
    b.id = 'wave-badge';
    document.body.appendChild(b);
  }
  b.textContent = 'WAVE ' + n;
  b.classList.add('visible');
}

function hideWaveHud() {
  var b = document.getElementById('wave-badge');
  if (b) b.classList.remove('visible');
  var h = document.getElementById('wave-hud');
  if (h) h.classList.remove('visible');
}

// Called when the last entity in the active wave dies. Auto-consumes any
// cheese picked up, refills bricks instantly, delays briefly for the
// player to breathe, then spawns next wave.
function onWaveCleared() {
  if (!_waveState.active || _waveState.advancing) return;
  _waveState.advancing = true;
  _waveState.highestReached = Math.max(_waveState.highestReached, _waveState.currentWave);
  // Auto-eat any cheese picked up this wave (+1 max HP per wheel)
  if (Rumble.eatAllCheese) Rumble.eatAllCheese();
  // Instant brick refill — no shimmer, just full pips for the next wave
  if (Rumble.refillBricks) Rumble.refillBricks();
  setTimeout(function() {
    if (!_waveState.active) return;  // player might have died during the gap
    _waveState.currentWave += 1;
    _waveState.advancing = false;
    spawnWave(_waveState.currentWave);
  }, 1500);
}

// Hook called from Rumble's onEvent — checks if a kill was the last in the wave.
function _onEnemyKilled() {
  if (!_waveState.active) return;
  // Check entity count via debug info. enemyKilled fires AFTER death so the
  // entity should already be removed; but we also need to wait for any
  // pack_flank twin or splitter spawn to NOT be present.
  setTimeout(function() {
    if (!_waveState.active) return;
    var info = Rumble.getDebugInfo();
    if (info && info.entityCount === 0) {
      onWaveCleared();
    }
  }, 100);  // tiny delay to let any post-death spawns (rot_grub split) settle
}

// Initialize the Rumble module ONCE on page load.
Rumble.init({
  onEvent: function(type, data) {
    // Suppress tick spam; log the rest.
    if (type !== 'tick') console.log('[Rumble]', type, data || '');
    if (type === 'tick') updateReadout(data);
    if (type === 'enemyKilled') _onEnemyKilled();
    if (type === 'end')  {
      // Record current wave as highest reached if player was IN a wave
      // when defeated. "Reached wave 5" reads as "got to wave 5" — being
      // in it counts even if you didn't clear it.
      if (_waveState.active) {
        _waveState.highestReached = Math.max(_waveState.highestReached, _waveState.currentWave);
      }
      _waveState.active = false;
      hideWaveHud();
      showEndOverlay(data && data.reason);
    }
  }
});

function startTestRumble(cls) {
  document.getElementById('overlay').style.display = 'none';
  tryFullscreen();

  var m = SPEC_CLASSES[cls];
  var isWaves = currentMode === 'waves';
  var startConfig = {
    cls: cls,
    hp: m.hp,
    hpMax: m.hp,
    armor: 0,
    mode: currentMode,
    // Waves mode uses the canonical class starter kit (2 sig + 1 sec) — same
    // as spec mode. Tests class identity progression with the intended
    // baseline rather than muddying with random sandbox quantities.
    bricks: (currentMode === 'spec' || isWaves) ? Object.assign({}, m.kit) : randomSandboxBricks(),
    // In waves mode, start with 0 entities — wave 1 spawns immediately
    // after Rumble.start via spawnWave(1).
    entityCount: isWaves ? 0 : currentEntityCount,
    // Entity type — either a specific type name from ENTITY_REGISTRY or
    // the literal string 'random' which tells rumble.js to roll a fresh
    // type per spawn (initial + respawns). See _resolveEntityType in
    // rumble.js for the pick logic.
    entityType: currentEntityType,
    // Per-color resistance overrides from the dialer UI. Applied to every
    // spawned entity. See rumble.js startup code.
    entityResistances: Object.assign({}, currentResistances),
    // Waves mode bypasses the sandbox auto-respawn — the test page manages
    // wave-to-wave spawns externally via Rumble.spawnEntity.
    suppressRespawn: isWaves,
  };
  Rumble.start(startConfig);

  // Show live readout in spec mode (refresh rates visible here)
  var readout = document.getElementById('readout');
  readout.classList.toggle('hidden', currentMode !== 'spec');

  // Initialize waves mode if selected
  if (isWaves) {
    _waveState.active = true;
    _waveState.currentWave = 1;
    _waveState.advancing = false;
    spawnWave(1);
  } else {
    _waveState.active = false;
    hideWaveHud();
  }
}

function updateReadout(state) {
  if (!state || currentMode !== 'spec') return;
  var r = document.getElementById('readout');
  var brickSummary = Object.entries(state.playerBricks || {})
    .filter(function(kv) { return kv[1] > 0 || (state.playerBrickMax[kv[0]] || 0) > 0; })
    .map(function(kv) {
      return '<span class="val">' + kv[0].substr(0,3) + ' ' + kv[1] + '/' + (state.playerBrickMax[kv[0]] || 0) + '</span>';
    })
    .slice(0, 5) // first 5 so it fits on small screens
    .join(' ');
  r.innerHTML =
    '<span class="label">overloads</span> <span class="val">' + state.overloadCount + '</span> ' +
    '<span class="label">elapsed</span> <span class="val">' + state.elapsed.toFixed(1) + 's</span><br>' +
    brickSummary;
}

function showEndOverlay(reason) {
  document.getElementById('readout').classList.add('hidden');
  var overlay = document.getElementById('overlay');
  var title = reason === 'victory' ? 'RUMBLE COMPLETE'
            : reason === 'timeout' ? "TIME'S UP"
            : reason === 'defeat'  ? 'DEFEATED'
            : 'RUMBLE ENDED';
  var color = reason === 'victory' ? '#F5D000' : '#888';
  // Surface highest wave reached if this was a waves run
  var waveLine = _waveState.highestReached > 0
    ? '<p style="color:#F5D000;font-size:18px;letter-spacing:.1em;margin:8px 0;">REACHED WAVE ' + _waveState.highestReached + '</p>'
    : '';
  overlay.innerHTML =
    '<h1 style="color:' + color + ';">' + title + '</h1>'
    + waveLine
    + '<p>' + (reason || 'ended') + '</p>'
    + '<div class="class-grid" style="width:180px;grid-template-columns:1fr;">'
    +   '<div class="class-pick" onclick="location.reload()">Play Again</div>'
    + '</div>';
  overlay.style.display = 'flex';
}

// Build the class grid on first render.
renderClassGrid();
renderResistGrid();

// URL ?debug=1 shows the debug overlay.
if (/[?&]debug=1/.test(location.search)) {
  var d = document.createElement('div');
  d.id = 'rumble-debug';
  document.body.appendChild(d);
}
</script>
</body>
</html>
