    +'<div style="flex:1;text-align:center;padding:12px;background:#11110a;border:2px solid '+fromColor+'44;border-radius:10px;">'
    +'<div style="font-size:9px;font-family:Cinzel,serif;letter-spacing:.06em;color:var(--text-dim);margin-bottom:8px;">THEY GIVE YOU</div>'
    +'<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:30px;align-items:center;">'+offerItems+'</div>'
    +'</div>'
    +'<div style="font-size:22px;color:var(--text-dim);">&#x21C4;</div>'
    // You give
    +'<div style="flex:1;text-align:center;padding:12px;background:#0a0a12;border:2px solid #4db8ff44;border-radius:10px;">'
    +'<div style="font-size:9px;font-family:Cinzel,serif;letter-spacing:.06em;color:var(--text-dim);margin-bottom:8px;">YOU GIVE THEM</div>'
    +'<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:30px;align-items:center;">'+wantItems+'</div>'
    +'</div>'
    +'</div>';

  document.getElementById('trade-modal').classList.add('visible');
  var banner = document.getElementById('phase-banner');
  if (banner) { banner.className = 'phase-banner battle-mine'; banner.textContent = '&#x1F504; TRADE REQUEST — Respond Now!'; }
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
}

function respondTrade(accept) {
  if(!pendingTradeOffer)return;
  client.respondTrade(pendingTradeOffer.id, accept);
  pendingTradeOffer=null;
  document.getElementById('trade-modal').classList.remove('visible');
  // Restore phase banner
  try { renderPhaseBanner(G.players[MY_CLASS]); } catch(e) {}
  toast(accept?'✓ Trade accepted!':'Trade declined','normal');
}

// ── DISARM CHAIN ──
function showRewardPopup(data) {
  var kind = data.kind || 'gold';
  var color, brickDots = '', detail = '';
  if (kind === 'brick') {
    color = data.brickColor || '#888';
    var bdr = data.brickColor === 'white' ? 'border:1px solid #ccc;' : '';
    brickDots = '<span style="width:26px;height:26px;border-radius:4px;background:'+color+';'+bdr+'display:inline-block;vertical-align:middle;margin:3px;box-shadow:0 1px 4px rgba(0,0,0,.5);"></span>';
  } else if (kind === 'shield') {
    color = '#4db8ff';
    brickDots = '<span style="font-size:28px;line-height:1;display:inline-block;vertical-align:middle;margin:3px;">🛡</span>';
  } else {
    // gold — show N coin icons
    color = '#F5D000';
    var amt = data.amount || 1;
    for (var ci=0; ci<amt; ci++) {
      brickDots += '<span style="font-size:30px;line-height:1;display:inline-block;vertical-align:middle;margin:3px;">🪙</span>';
    }
  }
  _pendingResult = {
    border: color,
    title: '',
    icon: '',
    mainNum: null,
    detail: '',
    kind: 'victory',
    brickDots: brickDots
  };
  render();
}

function showGateResult(msg, success) {
  _pendingResult = {
    border: success ? 'var(--green)' : 'var(--red)',
    title: success ? 'Gate Forced Open!' : 'Gate Held Firm',
    icon: success ? '🔓' : '🔒',
    mainNum: null,
    detail: msg,
    kind: 'gate'
  };
  render();
}

function showDashResult(data) {
  var events = data.gateEvents || [];
  var hadBreak = events.some(function(g){ return g.kind === 'break_success'; });
  var hadFail  = events.some(function(g){ return g.kind === 'break_fail'; });
  var hadKeyStop = events.some(function(g){ return g.kind === 'key_stop'; });
  var flavor = data.flavor || {};
  var lines = [];
  if (hadKeyStop) lines.push('A locked magical gate bars the way. The dash ends.');
  if (hadBreak)   lines.push(flavor.success || 'Crashed through!');
  if (hadFail)    lines.push(flavor.fail || 'The gate held.');
  if (!events.length) {
    lines.push((data.forcedByDM ? '[DM forced] ' : '') + 'Dashed ' + (data.end - data.start) + ' space' + ((data.end-data.start)===1?'':'s') + '.');
  }
  var dmgLine = data.totalDmg > 0
    ? '−' + data.totalDmg + ' HP' + (data.totalArmorAbsorbed>0?' ('+data.totalArmorAbsorbed+' absorbed by armor)':'')
    : data.totalArmorAbsorbed > 0 ? 'Armor absorbed all damage (' + data.totalArmorAbsorbed + ')' : '';
  var allClear = !hadFail && !hadKeyStop;
  _pendingResult = {
    border: hadFail ? 'var(--red)' : hadKeyStop ? 'var(--yellow)' : allClear ? 'var(--green)' : 'var(--orange)',
    title: data.forcedByDM ? 'Forced Dash' : (hadFail ? 'Dash Stopped' : hadBreak ? 'Through the Gate!' : hadKeyStop ? 'Gate Sealed' : 'Dashed!'),
    icon: hadBreak ? '💥' : hadFail ? '🛑' : hadKeyStop ? '🗝️' : '⚡',
    mainNum: data.totalDmg > 0 ? -data.totalDmg : null,
    detail: lines.join(' ') + (dmgLine ? '\n' + dmgLine : ''),
    kind: 'dash'
  };
  render();
}

function showLootScreen(loot) {
  var existing = document.getElementById('loot-modal');
  if (existing) existing.remove();
  var brickList = loot.bricks && loot.bricks.length
    ? loot.bricks.map(function(b) {
        var bg = BRICK_COLORS[b] || '#888';
        return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;background:' + bg + '22;border:1px solid ' + bg + '44;margin:2px;"><span style="width:10px;height:10px;border-radius:2px;background:' + bg + ';display:inline-block;"></span> 1 ' + b + '</span>';
      }).join('')
    : 'No bricks';
  var modal = document.createElement('div');
  modal.id = 'loot-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = '<div style="background:#1a1a1a;border:2px solid var(--gold);border-radius:14px;padding:20px;max-width:320px;width:100%;text-align:center;">'
    + '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--gold);margin-bottom:8px;">⚔️ Victory!</div>'
    + '<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;">Battle loot is available to collect</div>'
    + '<div style="padding:12px;background:var(--surface3);border-radius:10px;margin-bottom:14px;">'
    + '<div style="font-size:20px;color:var(--gold);font-weight:700;margin-bottom:6px;">+' + (loot.gold||0) + ' Gold</div>'
    + '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;">' + brickList + '</div>'
    + '</div>'
    + '<button class="btn success" onclick="collectLoot()" style="font-size:15px;padding:12px;">Collect Loot</button>'
    + '</div>';
  document.body.appendChild(modal);
}

function collectLoot() {
  client.send('collectLoot', { cls: MY_CLASS });
  var modal = document.getElementById('loot-modal');
  if (modal) {
    modal.innerHTML = '<div style="background:#1a1a1a;border:2px solid var(--green);border-radius:14px;padding:30px;text-align:center;">'
      + '<div style="font-size:20px;color:var(--green);margin-bottom:8px;">✓ Loot Collected!</div>'
      + '<div style="font-size:13px;color:var(--text-dim);">Waiting for DM to resolve battle and advance turn.</div>'
      + '</div>';
    setTimeout(function() { modal.remove(); }, 3000);
  }
}

function handleDisarmChain(data) {
  if(data.continueDisarm) {
    toast(`Disarm continues! (rolled ${data.roll} — odd)`, 'success');
  } else {
    toast(`Disarm stopped (rolled ${data.roll} — even)`, 'normal');
  }
}

// ── TOAST ──
function toast(msg, type='normal') {
  const el=document.getElementById('toast');
  const colors={normal:'#333',success:'#0a3a1a',warn:'#3a1a00'};
  el.style.background=colors[type]||'#333';
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

</script>
<script>
initFontSize();

(function(){
  var pill=document.getElementById('fc-pill');
  var ring=document.getElementById('fc-ring');
  var mag=document.getElementById('fc-mag');
  var isOpen=false,holdT=null,tapN=0,tapT=null;
  function open(){pill.classList.add('open');ring.classList.remove('active');pill.classList.remove('pressing');isOpen=true;}
  function close(){pill.classList.remove('open');isOpen=false;}
  function reset(){applyFontSize(16);var s=document.getElementById('font-size-slider');if(s)s.value=16;close();}
  var holdDuration = 1500;
  function startHold(){
    ring.classList.add('active');pill.classList.add('pressing');
    holdT=setTimeout(function(){
      if(isOpen){ close(); ring.classList.remove('active'); pill.classList.remove('pressing'); }
      else { open(); }
    }, holdDuration);
  }
  function cancelHold(){
    clearTimeout(holdT);
    ring.classList.remove('active');
    pill.classList.remove('pressing');
  }
  function handleTripleTap(){
    tapN++;clearTimeout(tapT);
    tapT=setTimeout(function(){
      if(tapN>=3){ reset(); }
      tapN=0;
    },500);
  }
  if(!mag)return;
  mag.addEventListener('mousedown',startHold);
  mag.addEventListener('mouseup',function(){ cancelHold(); handleTripleTap(); });
  mag.addEventListener('mouseleave',cancelHold);
  mag.addEventListener('touchstart',function(e){e.preventDefault();startHold();},{passive:false});
  mag.addEventListener('touchend',function(e){e.preventDefault();cancelHold();handleTripleTap();});
  mag.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
})();

</script>
<script>






























































































































































































var MY_CLASS = 'warrior';
var G = null;
var client = null;
var pendingTradeOffer = null;
var creeperInterval = null;
var _skillCostMap = {};
var lastRoll = null;

var CLS_STYLES = {
  warrior:     { color:'#993C1D', bg:'rgba(153,60,29,0.15)', border:'rgba(153,60,29,0.4)' },
  wizard:      { color:'#534AB7', bg:'rgba(83,74,183,0.15)', border:'rgba(83,74,183,0.4)' },
  scout:       { color:'#1D9E75', bg:'rgba(29,158,117,0.15)',border:'rgba(29,158,117,0.4)' },
  builder:     { color:'#EF9F27', bg:'rgba(239,159,39,0.15)',border:'rgba(239,159,39,0.4)' },
  mender:      { color:'#D4537E', bg:'rgba(212,83,126,0.15)',border:'rgba(212,83,126,0.4)' },
  beastcaller: { color:'#5DA831', bg:'rgba(93,168,49,0.15)', border:'rgba(93,168,49,0.4)' },
};

var _testClients = {};
var _testConnected = {};

var TAB_DEFS = [
  { id:'status',  label:'Status'  },
  { id:'actions', label:'Actions' },
  { id:'skills',  label:'Skills'  },
  { id:'party',   label:'Party'   },
];

function testSwitch(cls) {
  MY_CLASS = cls;
  _pendingResult = null;
  var s = CLS_STYLES[cls];
  var m = PLAYER_META[cls];
  document.documentElement.style.setProperty('--cls-color', s.color);
  document.documentElement.style.setProperty('--cls-bg',    s.bg);
  document.documentElement.style.setProperty('--cls-border',s.border);
  document.getElementById('t-icon').textContent = m.icon;
  document.getElementById('t-name').textContent = m.name + ' [TEST]';
  document.querySelectorAll('.cls-sw').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('sw-'+cls);
  if (btn) btn.classList.add('active');
  client = _testClients[cls] || null;
  var pill = document.getElementById('conn-pill');
  var on = !!_testConnected[cls];
  pill.className = 'conn-pill ' + (on?'on':'off');
  pill.textContent = on ? 'online' : 'offline';
  buildTabs();
  if (G) render();
}

function connectWS() {
  Object.keys(PLAYER_META).forEach(function(cls) {
    var c = new GameClient(cls);
    _testClients[cls] = c;
    c.on(function(event, data) {
      if (event === 'connected') {
        _testConnected[cls] = true;
        var dot = document.getElementById('dot-'+cls);
        if (dot) dot.className = 'sw-dot on';
        if (cls === MY_CLASS) {
          client = c;
          var p = document.getElementById('conn-pill');
          p.className = 'conn-pill on'; p.textContent = 'online';
        }
        c.send('setPlayerName', {cls:cls, name:'[TEST] '+PLAYER_META[cls].name});
      }
      if (event === 'disconnected') {
        _testConnected[cls] = false;
        var dot = document.getElementById('dot-'+cls);
        if (dot) dot.className = 'sw-dot';
        if (cls === MY_CLASS) {
          var p = document.getElementById('conn-pill');
          p.className = 'conn-pill off'; p.textContent = 'offline';
        }
      }
      if (event === 'state') {
        G = data;
        if (_pendingTradeSent && !G.pendingTrade) _pendingTradeSent = null;
        if (cls === MY_CLASS) { try { render(); } catch(e) { console.error('render:', e.message); } }
      }
      if (cls !== MY_CLASS) {
        // tradeOffer — always show modal in test since we simulate all players
        if (event === 'tradeOffer' && data.offer) showTradeModal(data.offer);
        return;
      }
      if (event === 'tradeOffer')      showTradeModal(data.offer);
      if (event === 'attackResult') { showRollResult(data); pushBattleFeed('⚔️', data.note+' → '+data.net+' damage on '+(data.monsterName||'monster'), 'attack'); }
      if (event === 'brickResult')  { showBrickResult(data); var bfl=(data.color||'').charAt(0).toUpperCase()+(data.color||'').slice(1)+' brick: '+(data.effect||''); pushBattleFeed('🧱',bfl,'brick'); }
      if (event === 'monsterAttackResult') {
        var isMe2 = data.targetCls === MY_CLASS;
        var tName2 = data.targetName || (G&&G.players[data.targetCls]?(G.players[data.targetCls].playerName||G.players[data.targetCls].name):'ally');
        var abs2 = data.armorAbsorbed>0?' ('+data.armorAbsorbed+' blocked)':'';
        var hmsg = data.net>0 ? data.monsterName+' → '+(isMe2?'YOU':tName2)+': −'+data.net+' HP'+abs2 : data.monsterName+' → '+(isMe2?'YOU':tName2)+': blocked!'+abs2;
        pushBattleFeed('👺', hmsg, isMe2?'hit':'monster');
        if (isMe2) {
          if (data.net>0) showDamageFlash(data.net, data.monsterName);
          var bc2 = data.net>0?'var(--red)':'var(--green)';
          _pendingResult = { border:bc2, title:data.net>0?data.monsterName+' attacks!':'Attack blocked!', icon:'👺', mainNum:data.net>0?-data.net:0, detail:data.net>0?'You take '+data.net+' damage'+abs2:'Armor absorbed all '+data.armorAbsorbed+' damage!', kind:'monster' };
          render();
        }
      }
      if (event === 'tameResult')      showTameResult(data);
      if (event === 'error')           toast(data.msg, 'warn');
      if (event === 'rewardPopup') { var isRiddleYellow = data.kind==='brick' && data.color==='yellow' && G && G.activeEvent && G.activeEvent.evType==='riddle'; if (!isRiddleYellow) showRewardPopup(data); }
      if (event === 'forceGateResult') showGateResult(data.success?'Gate forced! (roll '+data.roll+')':'Gate held (roll '+data.roll+') — 2 dmg', data.success);
      if (event === 'dashDenied' && data.cls===MY_CLASS) toast('Dash not possible — '+(data.reason||'denied'),'warn');
      if (event === 'dashResult' && data.cls===MY_CLASS) showDashResult(data);
      if (event === 'enhancedResult' && data.cls===MY_CLASS) toast('Enhanced Movement: '+data.duration+' turn(s)!','success');
      if (event === 'skillUnlocked') {
        var sn=(data.skillId||'').replace(/_/g,' ');
        toast('Skill Unlocked: '+sn.charAt(0).toUpperCase()+sn.slice(1)+'!','success');
        render();
      }
      if (event === 'scavengeResult') toast('Scavenge: '+data.recovered+' gray (roll '+data.roll+')',data.recovered>0?'success':'normal');
    });
  });
}

function setConn() {}  // no-op

function buildTabs() {
  var bar  = document.getElementById('tabs-bar');
  var cont = document.getElementById('tab-content');
  bar.innerHTML = '';
  cont.innerHTML = '';
  TAB_DEFS.forEach(function(t, i) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (i===0?' active':'');
    btn.textContent = t.label;
    btn.onclick = function() { switchTab(t.id, btn); };
    bar.appendChild(btn);
    var pane = document.createElement('div');
    pane.className = 'tab-pane' + (i===0?' active':'');
    pane.id = 'pane-'+t.id;
    cont.appendChild(pane);
  });
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var pane = document.getElementById('pane-'+id);
  if (pane) pane.classList.add('active');
  if (G) render();
}

window.addEventListener('load', function() {
  testSwitch('warrior');
  buildTabs();
  connectWS();
});






























































































































































































</script>
