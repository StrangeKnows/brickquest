<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Brick Quest — Test Players</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>





























































































































































































/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cls-color:#888;--cls-bg:#111;--cls-border:#333;
  --surface:#0f0f0f;--surface2:#1a1a1a;--surface3:#242424;
  --text:#e8e8e8;--text-dim:#888;--text-faint:#444;
  --green:#1D9E75;--red:#E24B4A;--yellow:#F5D000;--orange:#F57C00;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--surface);color:var(--text);font-size:15px;}

/* ── CLASS SELECTOR ── */
#class-select-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;padding:20px;
  background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a0a 100%);
}
#class-select-screen h1{
  font-family:'Cinzel',serif;font-size:28px;color:#F5D000;
  letter-spacing:.1em;margin-bottom:6px;text-align:center;
}
#class-select-screen p{font-size:14px;color:#666;margin-bottom:24px;text-align:center;}
.cls-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:400px;}
.cls-btn{
  padding:16px 8px;border-radius:12px;border:1px solid #333;
  background:#1a1a1a;cursor:pointer;text-align:center;
  transition:all .2s;
}
.cls-btn:active{transform:scale(.95);}
.cls-btn .icon{font-size:28px;display:block;margin-bottom:4px;}
.cls-btn .cname{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;color:#aaa;}
.cls-btn:hover{border-color:#666;}

/* ── MAIN LAYOUT ── */
#game-screen{display:none;height:100vh;height:100dvh;flex-direction:column;}
#game-screen.visible{display:flex;}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:linear-gradient(90deg,var(--cls-bg),#0a0a0a);
  border-bottom:1px solid var(--cls-border);
  flex-shrink:0;
}
.topbar-icon{font-size:24px;}
.topbar-name{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--cls-color);}
.conn-pill{
  font-size:10px;padding:2px 8px;border-radius:10px;
  font-family:'Crimson Pro',serif;margin-left:auto;font-weight:600;
}
.conn-pill.on{background:#0a2a1a;color:var(--green);}
.conn-pill.off{background:#222;color:#555;}

/* PHASE BANNER */
.phase-banner{
  padding:7px 14px;text-align:center;font-size:13px;font-weight:600;
  font-family:'Cinzel',serif;letter-spacing:.05em;flex-shrink:0;
}
.phase-banner.mine{background:var(--cls-bg);border-bottom:1px solid var(--cls-color);color:var(--cls-color);}
.phase-banner.waiting{background:#0a0a0a;border-bottom:1px solid #222;color:#444;}
.phase-banner.battle-mine{background:#1a0505;border-bottom:2px solid var(--red);color:var(--red);}
.phase-banner.battle-wait{background:#0f0505;border-bottom:1px solid #333;color:#555;}

/* TABS */
.tabs{display:flex;flex-shrink:0;border-bottom:1px solid #222;}
.tab{
  flex:1;padding:9px 4px;text-align:center;font-size:11px;
  font-family:'Cinzel',serif;letter-spacing:.04em;
  background:#0a0a0a;color:#555;cursor:pointer;border:none;
  border-right:1px solid #1a1a1a;transition:all .15s;
}
.tab:last-child{border-right:none;}
.tab.active{background:var(--cls-bg);color:var(--cls-color);border-bottom:2px solid var(--cls-color);}

/* SCROLL CONTENT */
.tab-content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));background:var(--surface);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.tab-pane{display:none;}
.tab-pane.active{display:block;min-height:100%;padding-bottom:calc(160px + env(safe-area-inset-bottom,0px));}

/* CARDS */
.card{
  background:var(--surface2);border:1px solid #2a2a2a;
  border-radius:10px;padding:12px;margin-bottom:10px;
}
.card-title{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;
  color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;
}

/* HP BAR */
.hp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.hp-big{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--cls-color);}
.hp-max{font-size:14px;color:var(--text-dim);}
.hpbar-outer{height:10px;border-radius:5px;background:#222;overflow:hidden;margin-bottom:8px;}
.hpbar-inner{height:100%;border-radius:5px;transition:width .4s,background .4s;}

/* STATS ROW */
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.stat-chip{
  background:var(--surface3);border-radius:8px;padding:7px 12px;
  text-align:center;flex:1;min-width:55px;
}
.stat-num{font-family:'Cinzel',serif;font-size:18px;font-weight:700;}
.stat-lbl{font-size:10px;color:var(--text-dim);margin-top:1px;}

/* BRICKS */
.bricks-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.brick-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 9px 4px 6px;border-radius:20px;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:opacity .15s;border:1px solid transparent;
}
.brick-tag:active{opacity:.6;}
.brick-tag.zero{opacity:.3;cursor:default;}

/* BUTTONS */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 14px;margin-bottom:7px;
  border-radius:10px;border:1px solid #333;background:var(--surface3);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;
  font-weight:600;cursor:pointer;text-align:center;transition:all .15s;
  line-height:1.3;
}
.btn:active{opacity:.7;transform:scale(.98);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn.primary{background:var(--cls-bg);border-color:var(--cls-color);color:var(--cls-color);}
.btn.danger{background:#1a0505;border-color:var(--red);color:var(--red);}
.btn.success{background:#051a0f;border-color:var(--green);color:var(--green);}
.btn.warn{background:#1a1005;border-color:var(--orange);color:var(--orange);}
.btn-row{display:flex;gap:6px;margin-bottom:7px;}
.btn-row .btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 14px;margin-bottom:7px;
  border-radius:10px;border:1px solid #333;background:var(--surface3);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;
  font-weight:600;cursor:pointer;text-align:center;transition:all .15s;
  line-height:1.3;
}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;display:inline-block;width:auto;}
.adj{
  padding:5px 12px;font-size:16px;border-radius:7px;
  border:1px solid #333;background:var(--surface3);
  cursor:pointer;color:var(--text);font-weight:700;
}
.adj:active{opacity:.6;}

/* ROLL DISPLAY */
.roll-display{
  background:var(--surface3);border-radius:12px;
  padding:16px;text-align:center;margin:8px 0;
}
.roll-num{font-family:'Cinzel',serif;font-size:52px;font-weight:700;color:var(--cls-color);}
.roll-sub{font-size:12px;color:var(--text-dim);margin-top:4px;}

/* CREEPER MINI-GAME */
.vine-container{
  position:relative;height:48px;border-radius:10px;
  background:#0a1a0a;border:1px solid #1a3a1a;overflow:hidden;margin:8px 0;
}
.vine-track{
  position:absolute;top:50%;left:0;right:0;height:6px;
  transform:translateY(-50%);background:#1a3a1a;border-radius:3px;
}
.vine-zone{
  position:absolute;top:50%;height:6px;transform:translateY(-50%);
  background:#237841;border-radius:3px;
}
.vine-indicator{
  position:absolute;top:50%;width:16px;height:24px;
  transform:translate(-50%,-50%);
  background:var(--yellow);border-radius:4px;transition:left .05s linear;
}
.cut-btn{
  width:100%;padding:14px;font-family:'Cinzel',serif;font-size:16px;
  font-weight:700;letter-spacing:.05em;border-radius:10px;
  background:#0a2a0a;border:2px solid #237841;color:#237841;cursor:pointer;
}
.cut-btn:active{background:#1D9E75;color:#fff;}

/* TRADE */
.trade-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;background:var(--surface3);border:1px solid #2a2a2a;
  margin-bottom:6px;
}

/* PARTY */
.party-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  background:var(--surface3);margin-bottom:6px;
}
.party-icon{font-size:20px;}
.party-hp-bar{flex:1;height:6px;border-radius:3px;background:#222;overflow:hidden;}
.party-hp-fill{height:100%;border-radius:3px;transition:width .3s;}

/* SKILL ROWS */
.skill-card{
  padding:10px 12px;border-radius:10px;border:1px solid #2a2a2a;
  background:var(--surface3);margin-bottom:7px;
}
.skill-card.locked .skill-name,.skill-card.locked .skill-desc{filter:blur(4px);user-select:none;pointer-events:none;}
.skill-card.partial{border-color:var(--cls-color);border-style:dashed;}
.skill-card.owned{border-color:var(--cls-color);}
.skill-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--cls-color);margin-bottom:3px;}
.skill-desc{font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:5px;}
.skill-use{font-size:11px;color:var(--green);margin-top:3px;}
.skill-prog{height:3px;border-radius:2px;background:#222;overflow:hidden;margin-bottom:5px;}
.skill-prog-fill{height:100%;border-radius:2px;}
.cost-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.cost-tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px 2px 5px;border-radius:10px;font-size:11px;font-weight:600;
}

/* TRADE CONSENT MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;background:#000a;
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.visible{display:flex;}
.modal-box{
  background:#1a1a1a;border:1px solid var(--cls-color);
  border-radius:14px;padding:20px;max-width:320px;width:100%;text-align:center;
}
.modal-title{font-family:'Cinzel',serif;font-size:16px;color:var(--cls-color);margin-bottom:8px;}
.modal-body{font-size:14px;color:var(--text-dim);margin-bottom:16px;line-height:1.5;}

/* STATUS BADGES */
.status-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.status-badge{
  font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600;
}
.status-badge.poisoned{background:#1a0a00;color:var(--orange);}
.status-badge.cursed{background:#1a0a1a;color:#7B2FBE;}
.status-badge.confused{background:#1a1500;color:var(--yellow);}
.status-badge.enhanced{background:#0a1a0a;color:var(--green);}
.status-badge.down{background:#1a0505;color:var(--red);}

/* DIVIDER */
.dv{border:none;border-top:1px solid #222;margin:10px 0;}

/* NOTIFICATION TOAST */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;
  background:#1a1a1a;border:1px solid #444;color:var(--text);
  z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}

#class-select-screen{display:none!important;}
#game-screen{display:flex!important;height:calc(100vh - 54px);}
#test-bar{display:flex;align-items:center;background:#060610;border-bottom:2px solid #222;flex-shrink:0;overflow-x:auto;}
.cls-sw{flex:1;min-width:52px;padding:10px 4px 8px;text-align:center;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;position:relative;}
.cls-sw .sw-icon{font-size:20px;display:block;}
.cls-sw .sw-label{font-family:"Cinzel",serif;font-size:9px;letter-spacing:.03em;color:#555;display:block;margin-top:2px;}
.cls-sw .sw-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:#333;}
.cls-sw.active .sw-label{color:var(--cls-color);}
.cls-sw.active{border-bottom-color:var(--cls-color);}
.cls-sw .sw-dot.on{background:#1D9E75;box-shadow:0 0 4px #1D9E75;}
.test-lbl{font-family:"Cinzel",serif;font-size:9px;letter-spacing:.06em;color:#333;padding:0 8px;border-right:1px solid #1a1a1a;writing-mode:vertical-rl;display:flex;align-items:center;justify-content:center;height:54px;}




























































































































































































</style>
</head>
<body>
<div id="test-bar">
  <div class="test-lbl">TEST</div>
  <button class="cls-sw active" id="sw-warrior" onclick="testSwitch('warrior')"><span class="sw-icon">⚔️</span><span class="sw-label">Warrior</span><span class="sw-dot" id="dot-warrior"></span></button>
  <button class="cls-sw" id="sw-wizard" onclick="testSwitch('wizard')"><span class="sw-icon">🔮</span><span class="sw-label">Wizard</span><span class="sw-dot" id="dot-wizard"></span></button>
  <button class="cls-sw" id="sw-scout" onclick="testSwitch('scout')"><span class="sw-icon">🏃</span><span class="sw-label">Scout</span><span class="sw-dot" id="dot-scout"></span></button>
  <button class="cls-sw" id="sw-builder" onclick="testSwitch('builder')"><span class="sw-icon">🔧</span><span class="sw-label">Builder</span><span class="sw-dot" id="dot-builder"></span></button>
  <button class="cls-sw" id="sw-mender" onclick="testSwitch('mender')"><span class="sw-icon">💊</span><span class="sw-label">Mender</span><span class="sw-dot" id="dot-mender"></span></button>
  <button class="cls-sw" id="sw-beastcaller" onclick="testSwitch('beastcaller')"><span class="sw-icon">🐾</span><span class="sw-label">Beast</span><span class="sw-dot" id="dot-beastcaller"></span></button>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="trade-modal"><div class="modal-box"><div style="font-size:28px;margin-bottom:6px;">🔄</div><div class="modal-title">Trade Request!</div><div class="modal-body" id="trade-modal-body">—</div><div style="display:flex;gap:10px;margin-top:4px;"><button class="btn success" onclick="respondTrade(true)" style="flex:1;font-size:16px;padding:14px;font-family:Cinzel,serif;">✓ Accept</button><button class="btn danger" onclick="respondTrade(false)" style="flex:1;font-size:16px;padding:14px;font-family:Cinzel,serif;">✗ Decline</button></div></div></div>
<style>
#fc-pill{position:fixed;bottom:14px;right:14px;z-index:9999;display:flex;align-items:center;background:transparent;border:none;border-radius:22px;height:44px;padding:0 6px;overflow:hidden;width:44px;transition:width 0.3s ease,background 0.3s,border 0.25s;}
#fc-pill.open{width:200px;background:rgba(0,0,0,0.72);border:1.5px solid rgba(255,255,255,0.15);}
#fc-pill.pressing{background:rgba(0,0,0,0.5);border:1.5px solid rgba(77,184,255,0.6);}#fc-pill.pressing #fc-mag,#fc-pill.open #fc-mag{background:rgba(255,255,255,0.08);}
#fc-mag{width:32px;height:32px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;position:relative;user-select:none;-webkit-user-select:none;transition:background 0.2s;}
#fc-ring{position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;pointer-events:none;}
#fc-ring.active{border-color:rgba(77,184,255,0.6);animation:fcring 1.5s linear forwards;}
@keyframes fcring{0%{transform:scale(0.6);opacity:0;}50%{transform:scale(1);opacity:1;border-color:rgba(77,184,255,0.8);}100%{transform:scale(1.15);opacity:0;}}
#fc-controls{display:flex;align-items:center;gap:6px;margin-left:8px;opacity:0;transition:opacity 0.2s;white-space:nowrap;flex-shrink:0;}
#fc-pill.open #fc-controls{opacity:1;}
</style>
<div id="fc-pill">
  <div id="fc-mag"><div id="fc-ring"></div><svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="display:block;flex-shrink:0;"><circle cx="8.5" cy="8.5" r="5" stroke="rgba(255,255,255,0.75)" stroke-width="1.8"/><line x1="12.5" y1="12.5" x2="17" y2="17" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/></svg></div>
  <div id="fc-controls">
    <span style="font-size:10px;color:rgba(255,255,255,0.4);font-family:sans-serif;font-weight:400;">A</span>
    <input type="range" id="font-size-slider" min="16" max="22" value="16" step="1" style="width:72px;cursor:pointer;accent-color:#4db8ff;" oninput="applyFontSize(this.value)">
    <span style="font-size:14px;color:rgba(255,255,255,0.5);font-family:sans-serif;font-weight:400;">A</span>
  </div>
</div>
<div id="zoom-root" style="width:100%;height:100dvh;transform-origin:top left;">
<div id="class-select-screen"></div>
<div id="game-screen">
  <div class="topbar"><span class="topbar-icon" id="t-icon">⚔️</span><span class="topbar-name" id="t-name">Warrior</span><span style="font-size:10px;color:#F5D000;background:#1a1500;padding:2px 8px;border-radius:8px;font-family:Cinzel,serif;">TEST</span><span class="conn-pill off" id="conn-pill">connecting…</span></div>
  <div class="phase-banner waiting" id="phase-banner">Waiting…</div>

  <div class="tab-content" id="tab-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  BRICK QUEST — Shared Game Constants v2.0
// ═══════════════════════════════════════════════════════════

const BRICK_COLORS = {
  red:'#D01012', blue:'#006DB7', green:'#237841', white:'#EFEFEF',
  gray:'#AAAAAA', purple:'#7B2FBE', yellow:'#F5D000',
  orange:'#F57C00', black:'#333333'
};
const BRICK_NAMES = Object.keys(BRICK_COLORS);

const PLAYER_META = {
  warrior:     { name:'Warrior',     icon:'⚔️', color:'#993C1D', hp:12, die:'d8' },
  wizard:      { name:'Wizard',      icon:'🔮', color:'#3C3489', hp:8,  die:'d6' },
  scout:       { name:'Scout',       icon:'🏃', color:'#085041', hp:10, die:'d6' },
  builder:     { name:'Builder',     icon:'🔧', color:'#854F0B', hp:10, die:'d6' },
  mender:      { name:'Mender',      icon:'💊', color:'#72243E', hp:10, die:'d4' },
  beastcaller: { name:'Beastcaller', icon:'🐾', color:'#27500A', hp:10, die:'d6' },
};

const SELF_HEAL_AMT  = { mender:4, warrior:3, builder:3, scout:2, wizard:2, beastcaller:2 };
// Shield (armor) rules:
// Warrior+Builder: 1 gray = +1 shield (free). Others: 2 gray = +1 shield.
// Max shield: Warrior base 75% hpMax, with Iron Hide 150% hpMax. All others 50% hpMax. Builder 50%.
const SHIELD_MAX = {
  warrior:     { base: 0.75, upgraded: 1.5, upgradeSkill: 'iron_hide' },
  builder:     { base: 0.50, upgraded: 0.50 },
  wizard:      { base: 0.50, upgraded: 0.50 },
  scout:       { base: 0.50, upgraded: 0.50 },
  mender:      { base: 0.50, upgraded: 0.50 },
  beastcaller: { base: 0.50, upgraded: 0.50 },
};
const SHIELD_COST = {
  warrior: 1, builder: 1,    // 1 gray per shield
  wizard: 2, scout: 2, mender: 2, beastcaller: 2  // 2 gray per shield
};
const ALLY_HEAL_AMT  = { mender:4 }; // everyone else = 2

// ── ZONES & SPACES ───────────────────────────────────────
// Zone 1: 8 spaces, store at idx 3 (space 4)
// Zone 2: 8 spaces
// Zone 3: 10 spaces, store at idx 4 (space 5)
// Zone 4: 10 spaces, merchant boat (store everywhere)
// Zone 5: 2 spaces, boss
const ZONES = [
  { name:'Zone 1', sub:'Courtyard',     icon:'🏰', tier:1, spaces:8,  storeAt:3 },
  { name:'Zone 2', sub:'Corridor',      icon:'🌑', tier:2, spaces:8,  storeAt:null },
  { name:'Zone 3', sub:'Guard Post',    icon:'👺', tier:3, spaces:10, storeAt:4 },
  { name:'Zone 4', sub:'Flood Chamber', icon:'🌊', tier:4, spaces:10, storeAt:'anywhere' },
  { name:'Zone 5', sub:'Throne Room',   icon:'💀', tier:5, spaces:2,  storeAt:null },
];

// Build flat space array
const SPACES = [];
let _si = 0;
ZONES.forEach((z,zi)=>{
  for(let s=0;s<z.spaces;s++){
    SPACES.push({
      idx:_si, zone:zi, zIdx:s,
      label:`${z.name}-${s+1}`,
      isStore: z.storeAt===s || z.storeAt==='anywhere',
      isBoss: zi===4,
      gateAfter: s===z.spaces-1 && zi<4, // last space of each non-final zone
    });
    _si++;

// ── CLIENT CLASS ─────────────────────────────────────────
class GameClient {
  constructor(role) {
    this.role = role;
    this.state = null;
    this.handlers = [];
    this._connect();
  }
  _connect() {
    const host = location.hostname;
    const port = location.port || 8080;
    this.ws = new WebSocket(`ws://${host}:${port}?role=${this.role}`);
    this.ws.onopen    = () => this._emit('connected');
    this.ws.onmessage = e => { const m=JSON.parse(e.data); if(m.type==='state'){this.state=m.state;this._emit('state',m.state);} else this._emit(m.type,m); };
    this.ws.onclose   = () => { this._emit('disconnected'); setTimeout(()=>this._connect(),2000); };
    this.ws.onerror   = () => this.ws.close();
  }
  send(type,payload={}) { if(this.ws.readyState===1) this.ws.send(JSON.stringify({type,payload})); }
  on(fn) { this.handlers.push(fn); }
  _emit(event,data) { this.handlers.forEach(h=>h(event,data)); }

  // Convenience
  nextTurn()                        { this.send('nextTurn'); }
  setPhase(p)                       { this.send('setPhase',{phase:p}); }
  adjustHP(cls,amount)              { this.send('adjustHP',{cls,amount}); }
  adjustBrick(cls,color,amount)     { this.send('adjustBrick',{cls,color,amount}); }
  addShield(cls)                    { this.send('addShield',{cls}); }
  purchaseBrick(cls,color)          { this.send('purchaseBrick',{cls,color}); }
  adjustGold(cls,amount)            { this.send('adjustGold',{cls,amount}); }
  adjustArmor(cls,amount)           { this.send('adjustArmor',{cls,amount}); }
  offerTrade(fromCls,toCls,wantBricks,offerBricks,offerGold) { this.send('offerTrade',{fromCls,toCls,wantBricks,offerBricks,offerGold}); }
  respondTrade(id,accept)           { this.send('respondTrade',{id,accept}); }
  unlockSkill(cls,skillId,cost)     { this.send('unlockSkill',{cls,skillId,cost}); }
  healPlayer(healerCls,targetCls)   { this.send('healPlayer',{healerCls,targetCls}); }
  revivePlayer(healerCls,targetCls) { this.send('revivePlayer',{healerCls,targetCls}); }
  massRepair()                      { this.send('massRepair'); }
  tameAttempt(cls,monsterIdx)       { this.send('tameAttempt',{cls,monsterIdx}); }
  commandTamed(cls,monsterIdx)      { this.send('commandTamed',{cls,monsterIdx}); }

}

// ── UTILITY ───────────────────────────────────────────────
function roll(sides)             { return Math.floor(Math.random()*sides)+1; }
function rollRange(min,max)      { return min+Math.floor(Math.random()*(max-min+1)); }
function brickDot(color,size=12) {
  const bg=BRICK_COLORS[color]||'#999';
  const border=color==='white'?'border:1px solid #ccc;':'';
  return `<span style="display:inline-block;width:${size}px;height:${size}px;border-radius:3px;background:${bg};${border}vertical-align:middle;flex-shrink:0;"></span>`;
}
function brickTag(color,qty,onClick='') {
  const bg=BRICK_COLORS[color]||'#999';
  const border=color==='white'?'border:1px solid #ccc;':'';
  return `<span class="brick-tag" style="background:${bg}22;border:1px solid ${bg};color:${color==='white'||color==='yellow'?'#555':bg};" ${onClick?`onclick="${onClick}"`:''}>
    <span style="width:10px;height:10px;border-radius:2px;background:${bg};${border}display:inline-block;"></span> ${qty} ${color}
  </span>`;
}
function hpBar(hp,max,color='#1D9E75') {
  const pct=Math.max(0,Math.round(hp/Math.max(max,1)*100));
  const c=hp<=Math.floor(max*.25)?'#E24B4A':hp<=Math.floor(max*.5)?'#EF9F27':color;
  return `<div style="height:8px;border-radius:4px;background:#333;overflow:hidden;">
    <div style="width:${pct}%;height:100%;background:${c};border-radius:4px;transition:width .4s;"></div>
  </div>`;
}
function buildMonsters(mids) {
  return mids.map(id=>{
    const t=MONSTER_TEMPLATES[id]; if(!t)return null;
    return {...t,hpCurrent:t.hp,hpMax:t.hp,confused:false,cursed:0,confuseRounds:0};
  }).filter(Boolean);
}

// Node.js export (ignored in browser)
if (typeof module !== 'undefined') {
  module.exports = { SPACES, ZONES, GATE_SPACES, BRICK_COLORS, BRICK_NAMES, MONSTER_TEMPLATES, COMPLICATIONS, LANDING_EVENTS, PLAYER_META, SHIELD_MAX, SHIELD_COST, RIDDLES };
}

function applyFontSize(size) {
  var scale = size / 16;
  var root = document.getElementById('zoom-root');
  var html = document.documentElement;
  var gs = document.getElementById('game-screen');
  var tc = document.getElementById('tab-content');

  if (scale <= 1) {
    // Default — body locked, tab-content scrolls naturally
    if (root) {
      root.style.transform = '';
      root.style.transformOrigin = '';
      root.style.width = '100%';
      root.style.minHeight = '';

    html.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.body.style.height = '100%';
    if (gs) { gs.style.height = ''; gs.style.minHeight = ''; gs.style.overflow = ''; }
    if (tc) { tc.style.overflow = ''; tc.style.flex = ''; tc.style.height = ''; }
  } else {
    // Zoomed in — root scaled up, body scrolls to reveal content
    var invScale = 1 / scale;
    if (root) {
      root.style.transformOrigin = 'top left';
      root.style.transform = 'scale(' + scale.toFixed(3) + ')';
      root.style.width = (invScale * 100).toFixed(2) + 'vw';
      root.style.minHeight = (invScale * 100).toFixed(2) + 'vh';
    }

    html.style.overflowX = 'hidden';

    document.body.style.height = 'auto';
    if (gs) { gs.style.height = 'auto'; gs.style.minHeight = (invScale*100).toFixed(2)+'vh'; gs.style.overflow = 'visible'; }

  }
  try { localStorage.setItem('bq_font_size', size); } catch(e) {}
}

var _wasBattle = false;

    var names = {gray:'Gray Brick',blue:'Blue Brick',white:'White Brick',gold:'Found Gold',monster:'Monster!',boss:'BOSS',trap:'Trap!',doubletrap:'Double Trap!',riddle:'Clue Found!',purple:'Purple Brick',creeper:'Creeping Vines!',nothing:'Nothing'};
    var descs = {gray:'Rubble and scrap metal. Take it or search for more.',blue:'A magical residue crystallized into brick form.',white:'A pristine white brick.',gold:'Coins on the ground.',monster:'A monster leaps out!',boss:'The boss awakens!',trap:'A hidden pressure plate!',doubletrap:'Two pressure plates — double damage!',riddle:'A yellow brick with a card beneath it.',purple:'A rare fragment — answer a challenge to claim it.',creeper:'Vines surge across the path!',nothing:'All clear.'};
    evData = {
      type: ev.evType,
      color: ev.brickColor || ev.evType,
      icon: icons[ev.evType] || '⚡',
      name: names[ev.evType] || ev.evType,
      desc: descs[ev.evType] || 'DM forced this event',
      amount: ev.goldAmount,
      mids: ev.mids || []
    };
  } else {
    var table = LANDING_EVENTS[ev.zone+1]||LANDING_EVENTS[1];
    evData = table ? table[ev.roll-1] : null;
  }
  if (evData) {
    showLandingResult(evData, ev.forced ? 'DM' : ev.roll, ev.zone);
    var burstKey = (ev.cls||'') + '|' + (ev.roll||'') + '|' + (ev.evType||'');
    if (_burstFiredFor !== burstKey) {
      _burstFiredFor = burstKey;
      burstParticles(evData.type || 'nothing');
    }
  }
}

function toggleStatusCard(id) {
  _statusOpen[id] = !_statusOpen[id];
  var body = document.getElementById(id+'-body');
  var arrow = document.getElementById(id+'-arrow');
  if (body) body.style.display = _statusOpen[id] ? 'block' : 'none';
  if (arrow) arrow.textContent = _statusOpen[id] ? '▼' : '▶';

function collapsibleCard(id, titleHtml, bodyHtml, startOpen) {
  var open = _statusOpen[id] !== undefined ? _statusOpen[id] : (startOpen || false);

    + '<div onclick="toggleStatusCard(\'' + id + '\')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;">'

  const enhBadge = enh ? `<span class="status-badge enhanced">⚡ Enhanced ×${enh}</span>` : '';
  // Movement debuff
  const debuff = G.movementDebuffs?.[MY_CLASS];
  const debuffBadge = debuff ? `<span class="status-badge poisoned">🐌 −${debuff} Move</span>` : '';

    </div>
  </div>` : '';

  const space = SPACES[me.space];
  const myKeys = Object.entries(G.magicKeys||{}).filter(([,cls])=>cls===MY_CLASS).map(([c])=>c);

  const shieldMult = (MY_CLASS==='warrior' && me.skills && me.skills.iron_hide) ? 1.5 : (MY_CLASS==='warrior' ? 0.75 : 0.5);
  const shieldMax  = Math.floor(me.hpMax * shieldMult);
  const shieldPct  = shieldMax > 0 ? Math.min(100, Math.round((me.armor||0) / shieldMax * 100)) : 0;
  // Shield pip blocks — one per max shield point, filled = active
  let shieldPips = '';
  for (let i = 0; i < shieldMax; i++) {

    shieldPips += `<span style="display:inline-block;width:${Math.max(10, Math.min(22, Math.floor(260/shieldMax)))}px;height:14px;border-radius:3px;margin:1px;`

      + '"></span>';

  el.innerHTML = `
    <div class="card">
      <div class="card-title">HP</div>
      <div class="hp-row">
        <span class="hp-big" style="color:${hc};">${me.hp}</span>
        <span class="hp-max">/ ${me.hpMax} HP</span>
      </div>
      <div class="hpbar-outer">
        <div class="hpbar-inner" style="width:${pct}%;background:${hc};"></div>
      </div>
      <div style="margin-top:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
          <span style="font-family:Cinzel,serif;font-size:10px;letter-spacing:.06em;color:#888;">🛡 SHIELD</span>
          <span style="font-family:Cinzel,serif;font-size:14px;font-weight:700;color:${(me.armor||0)>0?'#AAAAAA':'#333'};">${me.armor||0}<span style="font-size:10px;color:#555;"> / ${shieldMax}</span></span>
        </div>
        <div style="display:flex;flex-wrap:wrap;">${shieldPips}</div>
      </div>
      <div class="stats-row" style="margin-top:10px;">
        <div class="stat-chip">
          <div class="stat-num" style="color:#F5D000;">${me.gold}</div>
          <div class="stat-lbl">Gold</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" style="color:var(--text-dim);font-size:13px;">${space?.label||'Start'}</div>
          <div class="stat-lbl">Position</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" style="font-size:14px;">${me.die}</div>
          <div class="stat-lbl">Attack Die</div>
        </div>
      </div>
      ${(statuses||enhBadge||debuffBadge)?`<div class="status-wrap">${statuses}${enhBadge}${debuffBadge}</div>`:''}
      ${myKeys.length?`<div style="font-size:12px;color:var(--yellow);margin-top:4px;">🗝 Keys: ${myKeys.join(', ')}</div>`:''}
    </div>
    ${tamed}
    ${renderKOPanel(me)}
    ${renderMiniInventory(me)}
    ${renderBaseAbilities()}
    ${renderUnlockedSkills(me)}
    ${renderStatusClues()}
    `;
}

function renderActions(me) {
  const el = document.getElementById('pane-actions');
  if(!el) return;
  const isMyTurn = G.turnOrder[G.activePlayerIdx] === MY_CLASS;
  const inBattle = !!G.battle;
  const b = G.battle;
  const isMyBattleTurn = inBattle && !b.monsterTurn && b.initiative?.[b.initIdx]?.cls === MY_CLASS;

  if (isKO) { el.innerHTML = `<div class="card"><div style="color:var(--text-dim);text-align:center;font-size:13px;padding:20px;">You are KO — wait for revival.</div></div>`; return; }

    var br = G.battleResult;
    var loot = br.loot || {gold:0, bricks:[]};
    var alreadyResolved = br.resolvedBy.includes(MY_CLASS);
    var lootBrickDots = (loot.bricks||[]).map(function(bk) {

      + '<div style="padding:14px;background:var(--surface3);border-radius:10px;margin-bottom:14px;">'
      + '<div style="font-size:28px;font-weight:700;color:var(--gold);font-family:Cinzel,serif;margin-bottom:8px;">+'+(loot.gold||0)+' 🪙</div>'

    return;

    const phase1Done = b.phase1Complete;
    const livingMons = b.monsters?.filter(m=>m.hpCurrent>0)||[];
    const allDead = livingMons.length === 0;
    const cur = b.initiative?.[b.initIdx];
    const isMonsterTurn = b.monsterTurn;

    // ── 1. PLAYER STATS STRIP (always top) ──

    var bkDotsB = '';
    BRICK_NAMES.forEach(function(k){ var qty=me.bricks[k]||0;if(!qty)return;var bg=BRICK_COLORS[k];var bdr=k==='white'?'border:1px solid #ccc;':'';for(var bi=0;bi<qty;bi++) bkDotsB+='<span style="width:14px;height:14px;border-radius:3px;background:'+bg+';'+bdr+'display:inline-block;margin:1px;box-shadow:0 1px 3px rgba(0,0,0,.4);flex-shrink:0;"></span>'; });
    var playerActive = isMyBattleTurn;
    html += '<div style="background:var(--surface2);border:2px solid '+(playerActive?'var(--cls-color)':'#2a2a2a')+';border-radius:10px;padding:10px 12px;margin-bottom:8px;transition:border-color .3s;">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">'

      + '<span style="margin-left:auto;font-size:13px;font-weight:700;color:'+hcB+';">'+me.hp+'/'+me.hpMax+' HP</span>'
      + '<span style="font-size:11px;color:#888;margin-left:6px;">🛡'+me.armor+'/'+sMaxB+'</span>'
      + '</div>'
      + '<div style="height:5px;border-radius:3px;background:#222;overflow:hidden;margin-bottom:6px;">'

      html += '<div style="background:#1a0505;border:2px solid '+(isMonsterTurn&&!isDead?'#cc3333':'#2a1515')+';border-radius:10px;padding:10px 12px;margin-bottom:8px;transition:border-color .3s;">'
        + '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">'
        + '<span style="font-family:Cinzel,serif;font-size:13px;font-weight:700;color:'+(isDead?'#444':'#cc3333')+';">👺 '+mon.name+'</span>'
        + (isMonsterTurn&&!isDead ? '<span style="font-size:9px;font-family:Cinzel,serif;color:#cc3333;letter-spacing:.04em;">ATTACKING</span>' : '')
        + '<span style="font-size:12px;color:'+mhc+';font-weight:700;">'+mon.hpCurrent+' / '+mon.hp+' HP</span>'
        + '</div>'
        + '<div style="height:6px;border-radius:3px;background:#2a1010;overflow:hidden;margin-bottom:5px;">'
        + '<div style="width:'+mhpPct+'%;height:100%;background:'+mhc+';border-radius:3px;transition:width .4s;"></div></div>'
        + (tags ? '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'+tags+'</div>' : '')
        + (isDead ? '<div style="font-size:10px;color:#444;margin-top:2px;font-family:Cinzel,serif;">☠ Defeated</div>' : '')
        + '</div>';
    });

    // ── 3. INITIATIVE (compact, below bars) ──
    if (b.initiative && b.initiative.length && !allDead) {
      var initHtml = b.initiative.map(function(it, i) {
        var isCur = !b.monsterTurn && b.initIdx === i;
        var pm = PLAYER_META[it.cls];
        var isMe = it.cls === MY_CLASS;
        return '<span style="padding:2px 8px;border-radius:6px;font-size:11px;margin:2px;'
          + (isCur?'background:var(--cls-color)33;border:1px solid var(--cls-color)66;color:var(--cls-color);font-weight:700;':'background:#1a1a1a;border:1px solid #222;color:'+(isMe?'var(--text)':'var(--text-faint)'))+';">'
          + (isCur?'▶ ':'')+(pm?.icon||'')+(isMe?' You':' '+(pm?.name||it.cls))
          + '</span>';
      }).join('');
      var monCur = b.monsterTurn;
      initHtml += '<span style="padding:2px 8px;border-radius:6px;font-size:11px;margin:2px;'
        + (monCur?'background:#cc333333;border:1px solid #cc333366;color:#cc3333;font-weight:700;':'background:#1a1a1a;border:1px solid #222;color:var(--text-faint)')+';">'
        + (monCur?'▶ ':'')+'👺 Monsters</span>';
      html += '<div style="display:flex;flex-wrap:wrap;align-items:center;margin-bottom:8px;padding:4px 0;">'
        + '<span style="font-family:Cinzel,serif;font-size:9px;color:var(--text-faint);margin-right:6px;">R'+b.battleRound+'</span>'
        + initHtml + '</div>';
    }

    // ── 4. RESULT CARD ──
    if (_pendingResult) {
      html += renderResultCard();
    } else if (allDead && _victoryPending) {
      html += '<div style="background:#051a0f;border:2px solid var(--green);border-radius:12px;padding:16px;text-align:center;margin-bottom:8px;">'
        + '<div style="font-family:Cinzel,serif;font-size:16px;color:var(--green);margin-bottom:8px;">⚔️ Monster Defeated!</div>'
        + (battleFeed[0]?'<div style="font-size:12px;color:var(--text-dim);padding:6px;background:var(--surface3);border-radius:8px;">'+battleFeed[0].icon+' '+battleFeed[0].msg+'</div>':'')
        + '<div style="font-size:11px;color:var(--text-faint);margin-top:8px;">Tallying loot…</div></div>';
    } else if (allDead) {
      html += '<div style="background:#051a0f;border:2px solid var(--green);border-radius:12px;padding:16px;text-align:center;margin-bottom:8px;">'
        + '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--green);margin-bottom:6px;">⚔️ Victory!</div>'
        + '<div style="font-size:12px;color:var(--text-dim);">Loot incoming…</div></div>';

    } else if (isMyBattleTurn) {
      var monOpts2 = livingMons.map(function(m) {
        return '<option value="'+b.monsters.indexOf(m)+'">'+m.name+' ('+m.hpCurrent+'/'+m.hp+'HP · Armor '+m.armor+')</option>';
      }).join('');
      html += '<div style="background:var(--surface2);border:1px solid var(--cls-color)44;border-radius:10px;padding:10px;margin-bottom:8px;">'
        + '<div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:.08em;color:var(--cls-color);margin-bottom:6px;">TARGET</div>'
        + '<select id="mon-sel" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--cls-color)44;background:var(--surface3);color:var(--text);font-size:13px;">'
        + monOpts2 + '</select></div>';
      html += '<div style="background:var(--surface2);border:1px solid var(--cls-color)33;border-radius:10px;padding:12px;margin-bottom:8px;">'
        + '<div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:.08em;color:var(--cls-color);margin-bottom:8px;">SLOT 1 — ATTACK</div>'
        + '<button class="btn primary" onclick="doAttack()" style="width:100%;font-size:15px;padding:12px;font-family:Cinzel,serif;letter-spacing:.04em;margin-bottom:6px;">'
        + '⚔️ Roll '+me.die+' Attack'+(phase1Done&&b.monsters?.find(m=>m.blueOnly&&m.hpCurrent>0)?' — Phase 2 (Magic Only)':'')+' →'
        + '</button>'
        + '<button class="btn" onclick="doSearch()" style="width:100%;font-size:12px;color:var(--text-faint);">🔍 Search instead (find bricks)</button>'
        + '</div>';
      html += '<div style="background:var(--surface2);border:1px solid #2a2a2a;border-radius:10px;padding:12px;margin-bottom:8px;">'
        + '<div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:.08em;color:var(--text-faint);margin-bottom:8px;">SLOT 2 — BRICK SKILL</div>'
        + renderBrickButtons(me, b, phase1Done)
        + renderClassAbilities(me, b)
        + '</div>';
      html += '<button class="btn" onclick="client.send(&quot;advanceBattleTurn&quot;)" style="width:100%;color:var(--text-faint);font-size:12px;margin-bottom:8px;">Skip / Pass Turn →</button>';

    } else if (b.monsterTurn) {
      html += '<div style="background:#1a0505;border:1px solid #2a1515;border-radius:10px;padding:14px;text-align:center;margin-bottom:8px;">'
        + '<div style="font-size:11px;color:var(--red);font-family:Cinzel,serif;letter-spacing:.06em;">Watch your HP — you may be targeted.</div>'
        + '</div>';
    } else {
      var waitCls = cur?.cls;
      var waitPm = waitCls ? PLAYER_META[waitCls] : null;
      var waitPlayer = waitCls ? G.players[waitCls] : null;
      html += '<div style="background:var(--surface2);border:1px solid #2a2a2a;border-radius:10px;padding:14px;text-align:center;margin-bottom:8px;">'
        + '<div style="font-size:11px;font-family:Cinzel,serif;color:var(--text-dim);">Waiting for '+(waitPm?'<span style="color:'+waitPm.color+';">'+waitPm.name+'</span>':'?')+'</div>'
        + (waitPlayer?.hp !== undefined ? '<div style="font-size:10px;color:var(--text-faint);margin-top:4px;">'+waitPlayer.hp+'/'+waitPlayer.hpMax+' HP · 🛡'+(waitPlayer.armor||0)+'</div>' : '')
        + '</div>';
    }

    // ── 5. BATTLE LOG ──
    html += '<div style="background:var(--surface2);border:1px solid #2a2a3a;border-radius:10px;padding:10px;margin-bottom:8px;">'
      + '<div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:.08em;color:var(--text-faint);margin-bottom:6px;">BATTLE LOG</div>'
      + '<div id="battle-feed-list">'
      + (battleFeed.length ? '' : '<div style="font-size:12px;color:var(--text-faint);text-align:center;padding:8px;">Battle begins…</div>')
      + '</div></div>';

    // ── 6. COMPLICATION ──
    if (b.complication && b.complication!=='none') {
      const compLabels={poison:'☠ Poison — −1 HP at end of each round',trapped:'⚠ Trapped Battlefield — orange traps active',armored:'🛡 Armored Surge — main monster +2 armor',swarm:'🐝 Swarm — goblin spawns round 2'};
      html += '<div style="padding:8px 12px;border-radius:8px;background:#1a0800;border:1px solid var(--orange);font-size:12px;color:var(--orange);">'
        + (compLabels[b.complication]||b.complication)+'</div>';
    }
  }

  // ── OUT OF BATTLE ──
  else {
    // Pending result card (from reward, gate, etc.) — shown until dismissed
    html += renderResultCard();

    // Prepare phase — unified panel
    if (G.phase === 'prepare') {
      html += renderPreparePanel(me);
    }
    // Landing phase / event
    if (isMyTurn && G.phase === 'land' && !_pendingResult) {
      var hasActiveEvent = G.activeEvent && G.activeEvent.cls === MY_CLASS && !G.activeEvent.resolved;
      if (!hasActiveEvent) {
        html += renderLandPanel(me);
      } else {
        // Active event — skip Roll Die button but keep #landing-result container for restoreActiveEvent
        html += '<div id="landing-result"></div>';
      }
    }
    // Riddle active — all non-initiating players also need the landing-result container
    if (!isMyTurn && G.activeEvent && G.activeEvent.evType === 'riddle' && (G.activeEvent.riddleActive || G.activeEvent.riddleWinner || G.activeEvent.riddleExpired)) {
      html += '<div id="landing-result"></div>';
    }
    // Out of battle free actions — only during land phase or off-turn; prepare phase has its own panel
    if (G.phase !== 'prepare') {
      html += renderOutOfBattleActions(me);
    }
    // Gates
    html += renderGateActions(me);
  }

  el.innerHTML = html;
}

// ── PREPARE PANEL ──
var _expandedAction = null;
function toggleActionExpand(id) {
  _expandedAction = _expandedAction === id ? null : id;
  render();
}

var PREPARE_FLAVOR = [
  'The torches crackle. Someone should really check the pilot light.',
  'A rat scurries past. It looks like it has somewhere to be.',
  'You smell damp stone and bad decisions.',
  'The dungeon sighs. It\'s been a long week.',
  'Distant dripping. Always distant dripping.',
  'A draft from nowhere. Ghosts, probably. Or the HVAC.',
  'Your boots squelch. You don\'t want to know why.',
  'Something skitters. Or was that your stomach?',
  'The walls seem closer than before. Or you ate a big lunch.',
  'An old map flutters by. It\'s not yours, but finders keepers.',
  'Faint music from the east. The goblins might have a piano.',
  'You feel watched. Check the corner. Yep, a crack in the stone shaped like a face.',
  'The dungeon master rolls dice behind a screen. You pretend not to hear.',
  'A torch flickers out. Dramatic. Unnecessary. You are impressed.',
  'Somewhere, a door slams. You did not move.',
  'A low rumble. Either a dragon, or someone is hungry.',
  'You find a copper coin. It\'s stuck to the floor.',
  'The air tastes like old parchment and regret.',
  'A skeleton waves. You wave back. It\'s only polite.',
  'Brave, aren\'t you? Or short on other options.',
];
var _flavorIdx = 0;
function nextFlavor() {
  _flavorIdx = (_flavorIdx + Math.floor(Math.random()*5) + 1) % PREPARE_FLAVOR.length;
  return PREPARE_FLAVOR[_flavorIdx];
}
var _lastFlavorPhase = null;
var _lastFlavor = '';
function currentFlavor() {
  var key = (G && G.phase) + '|' + (G && G.round) + '|' + (G && G.activePlayerIdx);
  if (_lastFlavorPhase !== key) {
    _lastFlavorPhase = key;
    _lastFlavor = nextFlavor();
  }
  return _lastFlavor;
}

function renderPreparePanel(me) {
  var actions = buildPrepareActions(me);
  if (!actions.length) return '';
  var html = '<div style="text-align:center;margin:6px 0 14px 0;padding:0 10px;">'
    + '<div style="font-family:Cinzel,serif;font-size:13px;font-style:italic;color:var(--text-dim);line-height:1.5;">' + currentFlavor() + '</div>'
    + '</div>';
  actions.forEach(function(a) {
    html += renderActionButton(a);
  });
  return html;
}

function buildPrepareActions(me) {
  var list = [];
  var isMyTurn = G.turnOrder && G.turnOrder[G.activePlayerIdx] === MY_CLASS;
  var dashPending = !!(G.pendingDashRequest && G.pendingDashRequest.cls === MY_CLASS);
  var dashUsed = !!me.dashUsedThisTurn;
  var hasRed = (me.bricks.red||0) > 0;
  var hasWhite = (me.bricks.white||0) > 0;
  var hasGray = (me.bricks.gray||0) > 0;
  var die = (PLAYER_META[MY_CLASS] || {}).die || 'd6';
  var inBattle = G.battle && Array.isArray(G.battle.combatants) && G.battle.combatants.indexOf(MY_CLASS) >= 0;

  if (isMyTurn) {
  list.push({
    id: 'move',
    label: '🎲 Move',
    detail: 'Ready to make some moves?\nChoose how you\'ll advance this turn.',
    available: true,
    children: [
      {
        id: 'move_roll',
        label: '🎲 Roll Die',
        detail: 'Roll your ' + die + ' to see how many spaces you advance.\nCall the number to your DM — they\'ll move you on the board.',
        available: true,
        onUse: function() {},
      },
      {
        id: 'move_dash',
        label: '🔴 Red Brick Dash',
        detail: dashPending
          ? '⚡ CHARGING...\nAwaiting DM approval.'
          : dashUsed
            ? 'Already dashed this turn.\nRefreshes next prepare phase.'
            : !hasRed
              ? 'No red charges available.\nCollect red bricks to dash.'
              : 'Costs 1 red charge. Dash 1–4 spaces forward.\n\nIf you move fast enough into a door, it may hurt — but come tumbling down.\n\nOne red charge will be unavailable if you encounter any enemy this turn, but will return on next prepare phase.',
        available: hasRed && !dashUsed && !dashPending,
        pending: dashPending,
        onUse: useRedBrickMove,
      },
    ],
  });
  }

  {
    var healAmt = (typeof SELF_HEAL_AMT !== 'undefined' && SELF_HEAL_AMT[MY_CLASS]) ? SELF_HEAL_AMT[MY_CLASS] : 2;
    list.push({
      id: 'self_heal',
      label: '💊 Self Heal',
      detail: hasWhite
        ? 'Costs 1 white brick.\nRestore ' + healAmt + ' HP.'
        : 'No white bricks available.\nFind or trade for a white brick to heal.',
      available: hasWhite,
      onUse: selfHeal,
    });
  }

  if (MY_CLASS === 'mender') {
    list.push({
      id: 'heal_ally',
      label: '💊 Heal Ally',
      detail: hasWhite
        ? 'Costs 1 white brick.\nChoose an ally to restore HP.'
        : 'No white bricks available.',
      available: hasWhite,
      onUse: function(){ showHealSelector(-1); },
    });
    var whiteCount = me.bricks.white || 0;
    list.push({
      id: 'mass_repair',
      label: '💊 Mass Repair',
      detail: whiteCount >= 2
        ? 'Costs 2 white bricks.\nHeal every player a small amount.'
        : 'Need 2 white bricks.\nCurrent: ' + whiteCount + '.',
      available: whiteCount >= 2,
      onUse: function(){ client.massRepair(); },
    });
    var downed = Object.values(G.players).filter(function(p){ return !p.alive || p.hp<=0; });
    if (downed.length) {
      list.push({
        id: 'revive',
        label: '✨ Revive',
        detail: 'Bring a downed player back from the brink.\nCheck with DM for cost.',
        available: true,
        onUse: showReviveSelector,
      });
    }
  }

  {
    var hasIronHide = MY_CLASS === 'warrior' && me.skills && me.skills.iron_hide;
    var sCost = (MY_CLASS === 'warrior' || MY_CLASS === 'builder') ? 1 : 2;
    var sGain = hasIronHide ? 2 : 1;
    var sMult = hasIronHide ? 1.5 : (MY_CLASS === 'warrior' ? 0.75 : 0.5);
    var sMax = Math.floor(me.hpMax * sMult);
    var shieldHaveEnough = (me.bricks.gray || 0) >= sCost;
    var shieldAtMax = (me.armor || 0) >= sMax;
    var shieldDetail;
    if (shieldAtMax) {
      shieldDetail = 'Shield is at maximum (' + sMax + ').\nUse some or take a hit first.';
    } else if (!shieldHaveEnough) {
      shieldDetail = 'Needs ' + sCost + ' gray brick' + (sCost>1?'s':'') + '.\nCurrent: ' + (me.bricks.gray || 0) + '.\nWould add +' + sGain + ' pip.';
    } else {
      shieldDetail = 'Costs ' + sCost + ' gray brick' + (sCost>1?'s':'') + '.\n+' + sGain + ' pip.\nCurrent shield: ' + (me.armor || 0) + ' / ' + sMax + '.';
    }
    list.push({
      id: 'add_shield',
      label: '🛡 Add Shield',
      detail: shieldDetail,
      available: shieldHaveEnough && !shieldAtMax,
      onUse: function(){ client.addShield(MY_CLASS); },
    });
  }

  if (MY_CLASS === 'builder' && me.skills) {
    if (me.skills.forge) {
      var canForge = BRICK_NAMES.some(function(k){ return (me.bricks[k]||0) >= 2; });
      list.push({
        id: 'forge',
        label: '🔧 Forge',
        detail: canForge
          ? 'Combine 2 bricks of the same color into 1 of any color.'
          : 'Need 2 bricks of the same color to forge.',
        available: canForge,
        onUse: showForge,
      });
    }
    if (me.skills.blueprint) {
      list.push({
        id: 'blueprint',
        label: '📋 Blueprint',
        detail: hasGray
          ? 'Costs 1 gray brick.\nDuplicate one of your bricks.'
          : 'Need 1 gray brick.',
        available: hasGray,
        onUse: showBlueprint,
      });
    }
  }

  var zone = (SPACES[me.space] && SPACES[me.space].zone) || 0;
  var zoneRestricted = zone === 4;
  var marketBlocked = inBattle || zoneRestricted || G.storeDisabled;
  var marketDetail;
  if (inBattle) {
    marketDetail = 'Market closed during battle.';
  } else if (zoneRestricted) {
    marketDetail = 'Market unavailable in this zone.';
  } else if (G.storeDisabled) {
    marketDetail = 'Market closed by DM.';
  } else {
    marketDetail = 'Buy bricks with gold.\nYour gold: 🪙' + (me.gold || 0) + '.';
  }
  list.push({
    id: 'market',
    label: '🛒 Market',
    detail: marketDetail,
    available: !marketBlocked,
    isMarket: true,
    onUse: null,
  });

  return list;
}

function renderActionButton(a) {
  var expanded = _expandedAction === a.id || (a.children && a.children.some(function(c){return _expandedAction === c.id;}));
  var grayed = !a.available && !a.children && !a.isMarket;
  if (grayed && !a.pending) return '';
  var bg = a.pending ? '#3a1a0a' : expanded ? '#2a2a36' : '#1d1d28';
  var border = a.pending ? 'var(--red)' : expanded ? 'var(--cls-color)' : '#3a3a48';
  var opacity = grayed ? '0.45' : '1';
  var cursor = grayed ? 'not-allowed' : 'pointer';
  var boxShadow = expanded
    ? '0 0 0 2px var(--cls-color)55, 0 4px 12px rgba(0,0,0,0.6)'
    : '0 2px 6px rgba(0,0,0,0.5)';
  var html = '<div style="margin:0 0 14px 0;border-radius:12px;border:1px solid '+border+';background:'+bg+';overflow:hidden;box-shadow:'+boxShadow+';">'
    + '<div style="padding:16px 14px;font-size:15px;font-weight:700;color:var(--text);cursor:'+cursor+';opacity:'+opacity+';text-align:center;position:relative;" '
    +   'onclick="'+(grayed ? '' : "toggleActionExpand('"+a.id+"')")+'">'
    + '<span>'+a.label+'</span>'
    + '<span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:12px;">'+(expanded?'▾':'▸')+'</span>'
    + '</div>';
  if (expanded) {
    html += '<div style="padding:14px;border-top:1px solid rgba(255,255,255,0.08);font-size:13px;color:var(--text-dim);background:rgba(0,0,0,0.25);">'
         + '<div style="margin-bottom:12px;line-height:1.55;white-space:pre-line;text-align:center;">'+a.detail+'</div>';
    if (a.children) {
      a.children.forEach(function(c) { html += renderActionButton(c); });
    } else if (a.isMarket && a.available) {
      html += renderMarketGrid();
    } else if (a.available && a.onUse) {
      html += '<div style="text-align:center;"><button class="btn primary" style="width:100%;font-size:14px;" onclick="runAction(\''+a.id+'\')">Use</button></div>';
    } else if (a.pending) {
      html += '<div style="text-align:center;color:var(--red);font-family:Cinzel,serif;letter-spacing:.05em;padding:6px;">Waiting...</div>';
    }
    html += '</div>';
  }
  html += '</div>'; // close outer card div
  return html;
}

function renderMarketGrid() {
  if (!G || !G.players || !G.players[MY_CLASS]) return '';
  var me = G.players[MY_CLASS];
  var prices = { red:1, gray:1, green:1, blue:2, white:2, yellow:2, orange:2, purple:3, black:3 };
  var html = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">';
  Object.entries(prices).forEach(function(e) {
    var col = e[0], price = e[1];
    var bg = BRICK_COLORS[col] || '#888';
    var bdr = col === 'white' ? 'border:1px solid #ccc;' : '';
    var tc = (col === 'white' || col === 'yellow') ? '#333' : bg;
    var canAfford = (me.gold || 0) >= price;
    html += '<button onclick="buyBrick(this.dataset.color)" data-color="' + col + '" ' + (canAfford ? '' : 'disabled') + ' '
          + 'style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:10px;'
          + 'background:' + bg + '18;border:1px solid ' + (canAfford ? bg : '#333') + ';cursor:' + (canAfford ? 'pointer' : 'not-allowed') + ';'
          + 'opacity:' + (canAfford ? '1' : '.4') + ';">'
          + '<span style="width:22px;height:22px;border-radius:4px;background:' + bg + ';' + bdr + 'display:block;box-shadow:0 1px 3px rgba(0,0,0,.4);"></span>'
          + '<span style="font-family:Cinzel,serif;font-size:9px;letter-spacing:.04em;color:' + tc + ';">' + col + '</span>'
          + '<span style="font-size:13px;color:var(--gold);">🪙' + price + '</span>'
          + '</button>';
  });
  html += '</div>';
  return html;
}

var _actionRegistry = null;
function runAction(id) {
  _actionRegistry = {};
  var me = G && G.players ? G.players[MY_CLASS] : null;
  if (me) {
    var actions = buildPrepareActions(me);
    var walk = function(arr) { arr.forEach(function(a){ _actionRegistry[a.id] = a.onUse; if (a.children) walk(a.children); }); };
    walk(actions);
  }
  var fn = _actionRegistry[id];
  if (fn) fn();

function doSearch() {
  const isScout = MY_CLASS === 'scout';
  const r = roll(6);
  const threshold = isScout ? 3 : 5;
  let found = '';
  const colors = ['red','blue','green','gray','white','yellow','orange'];
  if (r >= 6) {
    const b1=colors[Math.floor(Math.random()*colors.length)];
    const b2=colors[Math.floor(Math.random()*colors.length)];
    client.adjustBrick(MY_CLASS,b1,1); client.adjustBrick(MY_CLASS,b2,1);
    found = `Found ${b1} + ${b2}!`;
  } else if (r >= threshold) {
    const b1=colors[Math.floor(Math.random()*colors.length)];
    client.adjustBrick(MY_CLASS,b1,1);
    found = `Found 1 ${b1}`;
  } else if (r >= 3 && isScout) {
    client.adjustBrick(MY_CLASS,'gray',1);
    found = 'Found 1 gray';
  } else {
    found = 'Nothing found';
  }
  const el = document.getElementById('search-result');
  if(el) el.innerHTML = `<div style="font-size:12px;color:var(--text-dim);margin-top:5px;">Roll ${r}: ${found}</div>`;
  client.addLog(`${PLAYER_META[MY_CLASS].name} searched: ${found}`,'reward');
  client.send('advanceBattleTurn');
}

var EVENT_BURST_COLORS = {
  gold:       ['#F5D000','#E8A23E','#FFF8DC'],
  gray:       ['#AAAAAA','#CCCCCC','#F0EED8'],
  blue:       ['#006DB7','#4db8ff','#7B2FBE'],
  riddle:     ['#F5D000','#FFE87C','#E8A23E'],
  trap:       ['#F57C00','#E24B4A','#FFE87C'],
  doubletrap: ['#F57C00','#E24B4A','#FFE87C'],
  monster:    ['#E24B4A','#D01012','#F57C00'],
  nothing:    ['#888888','#AAAAAA','#444444'],
  purple:     ['#7B2FBE','#9B6FD4','#4db8ff'],
  creeper:    ['#1D9E75','#5DA831','#FFE87C'],
  boss:       ['#D01012','#7B2FBE','#F5D000']
};

function burstParticles(evType) {
  var el = document.getElementById('landing-result');
  if (!el) return;
  // Try to originate from the event icon/brick element
  var originEl = el.querySelector('.event-icon-origin') || el.querySelector('span[style*="border-radius"]') || el;
  var rect = originEl.getBoundingClientRect();
  // Fallback to container center if element has no size
  if (rect.width === 0) rect = el.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var colors = EVENT_BURST_COLORS[evType] || EVENT_BURST_COLORS.nothing;
  var canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  // Randomize count 1.3-2.7x base of 32
  var baseCount = 32;
  var count = Math.round(baseCount * (1.3 + Math.random() * 1.4));
  var primaryCount = Math.round(count * 0.75);
  var particles = [];
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1.5 + Math.random() * 3.5;
    var isPrimary = i < primaryCount;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 1.5,
      r: isPrimary ? 3 + Math.random() * 4 : 1.5 + Math.random() * 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: isPrimary ? 1 : 0.5,
    });
  }
  var start = null;
  var DURATION = 420 * (1 + Math.random() * 1.7); // 420ms to ~1134ms
  function frame(ts) {
    if (!start) start = ts;
    var progress = Math.min((ts - start) / DURATION, 1);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12;
      var life = 1 - progress;
      ctx.globalAlpha = p.alpha * life * life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    if (progress < 1) requestAnimationFrame(frame);
    else canvas.remove();
  }
  requestAnimationFrame(frame);

        extra = '<div style="margin-top:10px;padding:16px 14px;background:#0d0d00;border:2px solid var(--yellow)33;border-radius:12px;text-align:center;">'          + '<div style="display:flex;justify-content:center;margin-bottom:12px;">' + YSQUARE + '</div>'          + '<div style="font-size:13px;color:#F5D000aa;font-style:italic;line-height:1.5;margin-bottom:8px;">' + initFlav + '</div>'          + '<div style="font-size:11px;color:var(--text-faint);margin-bottom:4px;">First correct answer wins +1 yellow brick · 3 attempts each</div>'          + '<div style="font-size:9px;color:var(--text-faint);font-family:Cinzel,serif;letter-spacing:.06em;margin-top:10px;">WAITING FOR ACTIVE PLAYER TO REVEAL</div>'          + '</div>';
      }
    }
  }

  // Trap event — show disarm option for Scout, Tap Burst for everyone, damage warning
  if (ev.type === 'trap' || ev.type === 'doubletrap') {
    var me2 = G.players[MY_CLASS];
    var hasGray = (me2 && (me2.bricks.gray||0) > 0);
    var isScout = MY_CLASS === 'scout';
    var double = ev.type === 'doubletrap';
    var trapResult = G.activeEvent && G.activeEvent.trapResult;
    if (trapResult) {
      if (trapResult.disarmed) {
        extra = '<div style="margin-top:10px;padding:14px;background:#0a1200;border:2px solid var(--green)66;border-radius:12px;text-align:center;">'
          + '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;">'
          + '<span style="width:42px;height:42px;border-radius:7px;background:#AAAAAA;display:inline-block;box-shadow:0 2px 6px rgba(0,0,0,.4);"></span>'
          + '<span style="font-size:18px;color:var(--text-dim);">→</span>'
          + '<span style="width:42px;height:42px;border-radius:7px;background:#F57C00;display:inline-block;box-shadow:0 2px 6px rgba(0,0,0,.4);"></span>'
          + '</div>'
          + '<div style="font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:6px;">Defused. The fortress concedes one brick.</div>'
          + '<div style="font-size:10px;color:var(--text-faint);font-family:Cinzel,serif;letter-spacing:.04em;">WAITING FOR DM</div>'
          + '</div>';
      } else {
        var dodged = trapResult.dodged || 0;
        var TRAP_FLAVOR_BY_DMG = {
          0: [
            'Fast reflexes.',
            'Not today.',
            'The trap blinked. You didn\'t.',
            'You were already moving.',
            'Clean dodge. The fortress is unimpressed.'
          ],
          1: [
            'A glancing blow. You\'ll feel it later.',
            'It grazed you. Could have been worse.',
            'One hit. The floor claims its small victory.',
            'Minor damage. Walk it off.',
            'Just a scratch. The trap is disappointed.'
          ],
          2: [
            'It was always going to happen like this.',
            'Two hits. The fortress is thorough.',
            'The floor had been waiting.',
            'You walked into both of them.',
            'Double tap. The trap was patient.'
          ],
          3: [
            'You found it. Painfully.',
            'Three strikes from the stone.',
            'One wrong step. The fortress collects its toll.',
            'The mechanism was well-designed.',
            'The trap gave no warning. It never does.'
          ],
          4: [
            'The fortress does not forgive impatience.',
            'Four hits. Something snapped.',
            'You triggered everything at once.',
            'The corridor emptied its lungs into you.',
            'Heavy toll. The architects were thorough.'
          ],
          5: [
            'The floor opened and did not stop.',
            'Five. You\'ve been marked by this place.',
            'The trap was old and angry.',
            'Maximum yield. The fortress is satisfied.',
            'Nothing personal. Entirely mechanical.'
          ]
        };
        // Use per-dmg pool if available, else fall back to generic
        var dmgKey = Math.min(trapResult.dmg, 5);
        if (dmgKey < 0) dmgKey = 0;
        var trapFlavPool = TRAP_FLAVOR_BY_DMG[dmgKey] || TRAP_FLAVOR_BY_DMG[3];
        var tSeed = (trapResult.dmg + dodged) % trapFlavPool.length;
        var trapFlav = trapFlavPool[tSeed];
        extra = '<div style="margin-top:10px;padding:14px;background:#1a0500;border:2px solid var(--orange)66;border-radius:12px;text-align:center;">'
          + '<div style="font-family:Cinzel,serif;font-size:28px;color:var(--red);margin-bottom:6px;">−' + trapResult.dmg + ' ❤️</div>'
          + (dodged > 0 ? '<div style="font-size:11px;color:#888;margin-bottom:6px;">' + dodged + ' blocked</div>' : '')
          + '<div style="font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.5;margin-bottom:6px;">' + trapFlav + '</div>'
          + '<div style="font-size:10px;color:var(--text-faint);font-family:Cinzel,serif;letter-spacing:.04em;">WAITING FOR DM</div>'
          + '</div>';
      }
    } else {
      // Scout disarm button
      var scoutBtn = (isScout && hasGray)
        ? '<button class="btn success" style="width:100%;margin-bottom:8px;" onclick="disarmTrap()">🔧 Disarm Trap — Scout skill (1 gray → 1 orange)</button>'
        : (isScout && !hasGray)
          ? '<div style="font-size:11px;color:var(--text-faint);margin-bottom:8px;">You could disarm this — but you need a gray brick.</div>'
          : '';
      extra = '<div style="margin-top:10px;padding:10px;background:#1a0500;border:2px solid var(--orange);border-radius:12px;">'
        + scoutBtn
        + '<div id="tap-burst-container"></div>'
        + '</div>';
    }
  }

  // Brick square color mapping
  var evColor = ev.color || ev.type;
  var brickBg = {
    blue:'#006DB7', gray:'#AAAAAA', white:'#EFEFEF', orange:'#F57C00',
    purple:'#7B2FBE', yellow:'#F5D000', red:'#D01012', green:'#237841'
  }[evColor] || null;
  var brickBorder = evColor === 'white' ? 'border:1px solid #ccc;' : '';
  var brickSquare = brickBg
    ? '<span class="event-icon-origin" style="width:52px;height:52px;border-radius:8px;background:'+brickBg+';'+brickBorder+'display:inline-block;box-shadow:0 2px 10px '+brickBg+'66;margin-bottom:8px;"></span>'
    : '<span class="event-icon-origin" style="font-size:42px;display:inline-block;">' + (ev.icon||'?') + '</span>';

  var flavorLine = getLandingFlavor(ev.type, ev.color, zone);

  // If extra is a self-contained result card, skip the outer header to avoid redundancy
  var alreadyChoseGray = (ev.type === 'gray' || ev.color === 'gray') && G.activeEvent && G.activeEvent.grayResult;
  var alreadyChoseBlue = (ev.type === 'blue' || ev.color === 'blue') && G.activeEvent && (G.activeEvent.blueResult || G.activeEvent.blueVariant);
  var alreadyRiddle = ev.type === 'riddle';
  var alreadyTrap = ev.type === 'trap' || ev.type === 'doubletrap';
  var alreadyGold = (ev.type === 'gold') && G.activeEvent && (G.activeEvent.goldResult || G.activeEvent.goldVariant);
  var hideHeader = alreadyChoseGray || alreadyChoseBlue || alreadyRiddle || alreadyTrap || alreadyGold;

  el.innerHTML = '<div class="roll-display" style="margin-top:8px;text-align:center;">'
    + (!hideHeader ? '<div style="display:flex;justify-content:center;margin-bottom:6px;">' + brickSquare + '</div>' : '')
    + (!hideHeader ? '<div style="font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.6;margin-bottom:10px;padding:0 8px;">' + flavorLine + '</div>' : '')
    + extra
    + '</div>';
  if (ev.type === 'creeper') { setTimeout(function() { startCreeperGame(zone); }, 800); }
  // Launch tap burst for trap events (if not already resolved)
  if ((ev.type === 'trap' || ev.type === 'doubletrap') && !(G.activeEvent && G.activeEvent.trapResult)) {
    var trapCount = (G.activeEvent && G.activeEvent.trapCount) || (ev.type === 'doubletrap' ? 2 : 1);
    setTimeout(function() { startTapBurst(trapCount); }, 400);
  }
  // Launch blue Category B event
  if ((ev.type === 'blue' || ev.color === 'blue') && G.activeEvent && G.activeEvent.blueVariant && !G.activeEvent.blueResult) {
    setTimeout(function() { startBlueEvent(G.activeEvent.blueVariant, G.activeEvent.isWizard); }, 400);
  }
  // Start result shower if blue result just arrived
  if ((ev.type === 'blue' || ev.color === 'blue') && G.activeEvent && G.activeEvent.blueResult) {
    setTimeout(startResultShower, 100);
  }
}

// ── TAP BURST MINI-GAME ──
var _tapBurstActive = false;
var _tapBurstHits = 0;
var _tapBurstMoveTimeout = null;
var _tapBurstInterval = null;
var _tapBurstLastQuad = -1;
var TAP_ESCAPE_MS = 565;
var _tapBurstTrapCount = 1;
var _tapBurstActive = false;
var _tapBurstHits = 0;
var _tapBurstMoveTimeout = null;
var _tapBurstInterval = null;
var _tapBurstLastQuad = -1;
var _tapBurstDistractInterval = null;

var TRAP_THEMES = [
  { name:'Pressure Plate',  btn:'DODGE!',  distracts:['PRESS!','CLICK!','SNAP!','TOO SLOW!','CRUNCH!'] },
  { name:'Tripwire',        btn:'JUMP!',   distracts:['WIRE!','SNAP!','TOO LATE!','DUCK!','TWANG!'] },
  { name:'Dart Wall',       btn:'DODGE!',  distracts:['INCOMING!','DART!','MOVE!','WATCH OUT!','WHIZ!'] },
  { name:'Swinging Blade',  btn:'DUCK!',   distracts:['SWING!','BLADE!','DOWN!','DANGER!','SLASH!'] },
  { name:'Floor Spikes',    btn:'JUMP!',   distracts:['SPIKES!','UP!','RISE!','MOVE!','JUMP!'] },
  { name:'Arrow Slit',      btn:'DODGE!',  distracts:['ARROW!','FIRE!','DUCK!','INCOMING!','LOOSE!'] },
  { name:'Cave-In',         btn:'RUN!',    distracts:['RUBBLE!','MOVE!','RUN!','ABOVE!','CRASH!'] },
  { name:'Fire Jet',        btn:'RUN!',    distracts:['FIRE!','HOT!','FLAMES!','BURN!','HEAT!'] },
];

var _currentTrap = null;

function startTapBurst(trapCount) {
  _tapBurstTrapCount = trapCount || 1;
  _currentTrap = TRAP_THEMES[Math.floor(Math.random() * TRAP_THEMES.length)];
  var needed = _tapBurstTrapCount * 9;
  var secs = _tapBurstTrapCount * 5;
  var container = document.getElementById('tap-burst-container');
  if (!container) return;

  var trapLabel = _tapBurstTrapCount === 1 ? '' : _tapBurstTrapCount === 2 ? 'DOUBLE ' : _tapBurstTrapCount + '× ';
  container.innerHTML =
    '<div style="text-align:center;padding:16px 12px;">'
    + '<div style="font-family:Cinzel,serif;font-size:15px;color:var(--orange);margin-bottom:6px;">'
    + '⚠' + ('⚠'.repeat(Math.min(_tapBurstTrapCount-1,2))) + ' ' + trapLabel + _currentTrap.name.toUpperCase() + '!'
    + '</div>'
    + '<div style="font-size:12px;color:var(--text-dim);margin-bottom:14px;line-height:1.6;">'
    + 'Tap the target <strong style="color:var(--orange);">' + needed + ' times</strong> in ' + secs + 's<br>'
    + 'Every 3 hits blocks 1 damage — <strong style="color:var(--red);">' + (_tapBurstTrapCount*3) + ' damage</strong> total'
    + '</div>'
    + '<button class="btn warn" style="width:100%;font-size:18px;font-weight:700;padding:14px;font-family:Cinzel,serif;letter-spacing:.08em;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;" onclick="launchTapBurst()">'
    + '⚡ ' + _currentTrap.btn
    + '</button>'
    + '</div>';
}

function launchTapBurst() {
  var trapCount = _tapBurstTrapCount;
  var trap = _currentTrap || TRAP_THEMES[0];
  var NEEDED = trapCount * 9;
  var TOTAL_MS = trapCount * 5000;
  var container = document.getElementById('tap-burst-container');
  if (!container) return;
  _tapBurstActive = true;
  _tapBurstHits = 0;
  _tapBurstLastQuad = -1;
  var startTime = Date.now();
  var AW = 280, PAD = 32;

  container.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">'
    + '<div style="font-size:11px;color:var(--orange);font-family:Cinzel,serif;letter-spacing:.06em;">' + trap.name.toUpperCase() + '!</div>'
    + '<div id="tap-hits-display" style="font-size:16px;font-weight:700;color:var(--orange);">0 / ' + NEEDED + '</div>'
    + '</div>'
    + '<div style="height:6px;border-radius:3px;background:#2a1a0a;margin-bottom:4px;overflow:hidden;">'
    + '<div id="tap-timer-bar" style="height:100%;background:var(--orange);border-radius:3px;width:100%;"></div>'
    + '</div>'
    + '<div style="font-size:10px;color:var(--text-faint);margin-bottom:5px;text-align:right;">3 hits = −1 damage</div>'
    + '<div id="tap-arena" style="position:relative;width:100%;height:185px;background:#1a0505;border:2px solid var(--orange);border-radius:10px;overflow:hidden;touch-action:none;user-select:none;"></div>';

  var arena = document.getElementById('tap-arena');
  if (!arena) return;

  // Distraction words
  var distractWords = trap.distracts;
  clearInterval(_tapBurstDistractInterval);
  _tapBurstDistractInterval = setInterval(function() {
    if (!_tapBurstActive || !arena) return;
    var old = arena.querySelectorAll('.distract-word');
    if (old.length > 2) return; // max 2 at a time
    var word = distractWords[Math.floor(Math.random()*distractWords.length)];
    var el = document.createElement('div');
    el.className = 'distract-word';
    var arenaW = arena.offsetWidth || 280;
    var x = 20 + Math.random() * (arenaW - 80);
    var y = 20 + Math.random() * 140;
    el.style.cssText = 'position:absolute;left:'+x+'px;top:'+y+'px;'
      + 'font-family:Cinzel,serif;font-size:14px;font-weight:700;color:#cc3333;'
      + 'pointer-events:none;opacity:1;transition:opacity .6s;z-index:1;';
    el.textContent = word;
    arena.appendChild(el);
    setTimeout(function(){ el.style.opacity='0'; setTimeout(function(){ if(el.parentNode) el.remove(); }, 650); }, 600);
  }, 700);

  function getNewPos() {
    var quads = [0,1,2,3].filter(function(q){ return q !== _tapBurstLastQuad; });
    var q = quads[Math.floor(Math.random()*quads.length)];
    _tapBurstLastQuad = q;
    var hw = AW/2, hh = 92;
    var x = (q%2===0 ? PAD : hw+PAD) + Math.random()*Math.max(1, hw-PAD*2);
    var y = (q<2 ? PAD : hh+PAD) + Math.random()*Math.max(1, hh-PAD*2);
    return {x: Math.round(x), y: Math.round(y)};
  }

  function spawnTarget() {
    if (!_tapBurstActive) return;
    var old = arena.querySelector('.tap-target');
    if (old) old.remove();
    var pos = getNewPos();
    var target = document.createElement('div');
    target.className = 'tap-target';
    target.style.cssText = 'position:absolute;width:52px;height:52px;border-radius:50%;'
      + 'background:#E8610A;'
      + 'box-shadow:0 0 12px 3px #E8610A66;'
      + 'cursor:pointer;z-index:2;'
      + 'left:'+pos.x+'px;top:'+pos.y+'px;transform:translate(-50%,-50%);'
      + 'animation:target-pop .14s ease-out forwards;';
    var fired = false;
    function hitHandler(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (!_tapBurstActive || fired) return;
      fired = true;
      clearTimeout(_tapBurstMoveTimeout);
      var ring = document.createElement('div');
      ring.style.cssText = 'position:absolute;border-radius:50%;border:3px solid #E8610A;'
        + 'pointer-events:none;left:'+pos.x+'px;top:'+pos.y+'px;transform:translate(-50%,-50%);'
        + 'animation:hit-ring .35s ease-out forwards;width:52px;height:52px;z-index:2;';
      arena.appendChild(ring);
      setTimeout(function(){ if(ring.parentNode) ring.remove(); }, 380);
      _tapBurstHits++;
      var disp = document.getElementById('tap-hits-display');
      if (disp) {
        disp.textContent = _tapBurstHits + ' / ' + NEEDED;
        disp.style.color = _tapBurstHits >= NEEDED ? 'var(--green)' : _tapBurstHits >= Math.floor(NEEDED*2/3) ? 'var(--yellow)' : 'var(--orange)';
      }
      target.remove();
      if (_tapBurstHits >= NEEDED) { finishTapBurst(true); }
      else { setTimeout(spawnTarget, 90); }
    }
    target.addEventListener('click', hitHandler);
    target.addEventListener('touchstart', hitHandler, {passive:false});
    arena.appendChild(target);
    clearTimeout(_tapBurstMoveTimeout);
    _tapBurstMoveTimeout = setTimeout(function() {
      if (_tapBurstActive && !fired) spawnTarget();
    }, TAP_ESCAPE_MS);
  }

  _tapBurstInterval = setInterval(function() {
    var elapsed = Date.now() - startTime;
    var pct = Math.max(0, 100 - (elapsed / TOTAL_MS * 100));
    var bar = document.getElementById('tap-timer-bar');
    if (bar) {
      bar.style.width = pct + '%';
      bar.style.background = pct > 55 ? 'var(--orange)' : pct > 22 ? 'var(--yellow)' : 'var(--red)';
      bar.style.transition = 'none';
    }
    if (elapsed >= TOTAL_MS) finishTapBurst(false);
  }, 33);

  function finishTapBurst(success) {
    if (!_tapBurstActive) return;
    _tapBurstActive = false;
    clearInterval(_tapBurstInterval);
    clearInterval(_tapBurstDistractInterval);
    clearTimeout(_tapBurstMoveTimeout);
    var old = arena.querySelector('.tap-target');
    if (old) old.remove();
    var blocked = Math.floor(_tapBurstHits / 3);
    client.resolveEvent(MY_CLASS, 'trapDodge', { dodged: blocked });
    var maxDmg = trapCount * 3;
    var remaining = Math.max(0, maxDmg - blocked);
    var msg;
    if (success) {
      msg = '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--green);margin-bottom:4px;">⚡ ' + trap.name + ' evaded!</div>'
          + '<div style="font-size:12px;color:var(--text-dim);">Full ' + maxDmg + ' damage blocked!</div>';
    } else if (blocked > 0) {
      msg = '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--yellow);margin-bottom:4px;">🎯 ' + _tapBurstHits + ' / ' + NEEDED + ' hits</div>'
          + '<div style="font-size:12px;color:var(--text-dim);">' + blocked + ' damage blocked — ' + remaining + ' damage through.</div>';
    } else {
      msg = '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--red);margin-bottom:4px;">💥 ' + trap.name + ' hits!</div>'
          + '<div style="font-size:12px;color:var(--text-dim);">Full ' + maxDmg + ' damage incoming.</div>';
    }
    container.innerHTML = '<div style="text-align:center;padding:14px;background:#0a0a0a;border-radius:10px;border:1px solid #333;">' + msg + '</div>';
  }

  setTimeout(function() {
    AW = arena.offsetWidth || 280;
    spawnTarget();
  }, 80);
}

function startBlueEvent(variant, isWizard) {

  if (!container) return;

  var variantNames = { singing_stone:'The Singing Stone', sentry_stone:'The Sentry Stone', cipher_lock:'The Cipher Lock' };

  // Concise one-line mechanic descriptions
  var mechanics = {
